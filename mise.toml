[tools]
rust = "1.94.1"

[tasks.env]
run = "./scripts/cargo-flow.sh env"

[tasks.dev]
run = "./scripts/cargo-flow.sh build"

[tasks.build]
run = "./scripts/cargo-flow.sh build --release"

[tasks.test]
run = "./scripts/cargo-flow.sh test"

[tasks.clippy]
run = "./scripts/cargo-flow.sh clippy"

[tasks.compat]
run = "./scripts/cargo-flow.sh compat"

[tasks.check]
run = "./scripts/cargo-flow.sh check"

[tasks.pre-commit]
run = "cargo fmt -- --check && cargo clippy --locked --all-targets --all-features -- -D warnings"

[tasks.install-hooks]
run = "git config core.hooksPath .githooks && chmod +x .githooks/pre-commit"

[tasks.fmt]
run = "cargo fmt"

[tasks.fmt-check]
run = "cargo fmt -- --check"
