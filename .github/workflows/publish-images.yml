name: Publish Base Images

on:
  workflow_run:
    workflows: ["Build and Release CLI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      cli_version:
        description: "CLI version tag (e.g., v1.12.7). Defaults to latest release."
        required: false
  push:
    branches: [main]
    paths: ["images/**"]

concurrency:
  group: publish-images-${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.cli_version || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/boringcache/base

jobs:
  publish:
    name: Build & publish base images
    runs-on: ubuntu-24.04
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - uses: actions/checkout@v4

      - name: Resolve CLI version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.cli_version }}" ]; then
            VERSION="${{ inputs.cli_version }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Extract the tag that triggered the release workflow
            VERSION=$(gh run view ${{ github.event.workflow_run.id }} --json headBranch -q .headBranch)
          else
            VERSION=$(gh release view --json tagName -q .tagName)
          fi
          echo "cli_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved CLI version: ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if images already exist
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.cli_version }}"
          if docker manifest inspect "${{ env.IMAGE }}:bookworm-${VERSION}" > /dev/null 2>&1; then
            echo "Images for ${VERSION} already exist — skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push bookworm
        if: steps.exists.outputs.skip != 'true'
        uses: boringcache/one@v1
        with:
          mode: docker
          setup: none
          context: images/bookworm
          image: ${{ env.IMAGE }}
          tags: |
            bookworm
            bookworm-${{ steps.version.outputs.cli_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          cache-tag: base-bookworm
          build-args: |
            BORINGCACHE_VERSION=${{ steps.version.outputs.cli_version }}
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Build & push bookworm-build
        if: steps.exists.outputs.skip != 'true'
        uses: boringcache/one@v1
        with:
          mode: docker
          setup: none
          context: images/bookworm-build
          image: ${{ env.IMAGE }}
          tags: |
            bookworm-build
            bookworm-build-${{ steps.version.outputs.cli_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          cache-tag: base-bookworm-build
          build-args: |
            BORINGCACHE_TAG=bookworm-${{ steps.version.outputs.cli_version }}
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Summary (skipped)
        if: steps.exists.outputs.skip == 'true'
        run: |
          VERSION="${{ steps.version.outputs.cli_version }}"
          echo "## Base images already exist for ${VERSION} — skipped" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: steps.exists.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.cli_version }}"
          echo "## Base images published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| bookworm | \`bookworm\`, \`bookworm-${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| bookworm-build | \`bookworm-build\`, \`bookworm-build-${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.IMAGE }}:bookworm" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.IMAGE }}:bookworm-build" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------
  # Smoke test — validate pushed images end-to-end
  # ---------------------------------------------------------------
  smoke-test:
    name: Smoke test
    needs: [publish]
    runs-on: ubuntu-24.04

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify bookworm
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm sh -c '
            set -e
            mise --version
            boringcache --version
            boringcache run test-org/test tag:path -- echo "boringcache run fallback OK"
          '

      - name: Verify bookworm-build
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            gcc --version | head -1
            pkg-config --version
            mise --version
            boringcache --version
          '

      - name: Verify mise + boringcache run (Ruby + bundle install)
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            cd /tmp
            printf "[tools]\nruby = \"3.4.4\"\n" > mise.toml
            mise settings ruby.compile=false
            mise install
            ruby --version
            gem --version

            mkdir -p myapp && cd myapp
            echo "source \"https://rubygems.org\"" > Gemfile
            echo "gem \"rake\"" >> Gemfile
            export BUNDLE_PATH="vendor/bundle"
            boringcache run test-org/test gems:vendor/bundle -- bundle install
            bundle exec rake --version
          '

      - name: Summary
        run: |
          echo "## Smoke tests passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- bookworm: mise, boringcache CLI, no-token fallback" >> "$GITHUB_STEP_SUMMARY"
          echo "- bookworm-build: build tools, mise, boringcache CLI" >> "$GITHUB_STEP_SUMMARY"
          echo "- mise + boringcache run: Ruby 3.4.4, bundle install, no-token fallback" >> "$GITHUB_STEP_SUMMARY"
