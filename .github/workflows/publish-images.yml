name: Publish Base Images

on:
  workflow_run:
    workflows: ["Build and Release CLI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      cli_version:
        description: "CLI version tag (e.g., v1.12.7). Defaults to latest release."
        required: false
  push:
    branches: [main]
    paths: ["images/**"]
  pull_request:
    paths: ["images/**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/boringcache/base

jobs:
  publish:
    name: Build & publish base images
    runs-on: ubuntu-24.04
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Resolve CLI version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.cli_version }}" ]; then
            VERSION="${{ inputs.cli_version }}"
          else
            VERSION=$(gh release view --json tagName -q .tagName)
          fi
          echo "cli_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved CLI version: ${VERSION}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Release / push / dispatch — boringcache/one with multi-arch push
      # ---------------------------------------------------------------
      - name: Build & push bookworm
        if: github.event_name != 'pull_request'
        uses: boringcache/one@v1
        with:
          mode: docker
          setup: none
          context: images/bookworm
          image: ${{ env.IMAGE }}
          tags: |
            bookworm
            bookworm-${{ steps.version.outputs.cli_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          cache-tag: base-bookworm
          build-args: |
            BORINGCACHE_VERSION=${{ steps.version.outputs.cli_version }}
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      - name: Remove buildx builder from bookworm step
        if: github.event_name != 'pull_request'
        run: docker buildx rm "boringcache-${GITHUB_RUN_ID}" || true

      - name: Build & push bookworm-build
        if: github.event_name != 'pull_request'
        uses: boringcache/one@v1
        with:
          mode: docker
          setup: none
          context: images/bookworm-build
          image: ${{ env.IMAGE }}
          tags: |
            bookworm-build
            bookworm-build-${{ steps.version.outputs.cli_version }}
          platforms: linux/amd64,linux/arm64
          push: true
          load: false
          cache-tag: base-bookworm-build
          build-args: |
            BORINGCACHE_TAG=bookworm-${{ steps.version.outputs.cli_version }}
        env:
          BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}

      # ---------------------------------------------------------------
      # PR — plain docker build, single-arch, validate + smoke test
      # ---------------------------------------------------------------
      - name: Validate bookworm (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --build-arg BORINGCACHE_VERSION="${{ steps.version.outputs.cli_version }}" \
            -t ${{ env.IMAGE }}:bookworm \
            images/bookworm

      - name: Validate bookworm-build (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --build-arg BORINGCACHE_TAG=bookworm \
            -t ${{ env.IMAGE }}:bookworm-build \
            images/bookworm-build

      - name: Smoke test (PR)
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm sh -c '
            set -e
            mise --version
            boringcache --version
            boringcache run test-org/test tag:path -- echo "boringcache run fallback OK"
          '
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            gcc --version | head -1
            mise --version
            boringcache --version
          '

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          VERSION="${{ steps.version.outputs.cli_version }}"
          echo "## Base images published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | Tags |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| bookworm | \`bookworm\`, \`bookworm-${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| bookworm-build | \`bookworm-build\`, \`bookworm-build-${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.IMAGE }}:bookworm" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.IMAGE }}:bookworm-build" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------
  # Smoke test — validate pushed images end-to-end
  # ---------------------------------------------------------------
  smoke-test:
    name: Smoke test
    needs: [publish]
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request'

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify bookworm
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm sh -c '
            set -e
            mise --version
            boringcache --version
            boringcache run test-org/test tag:path -- echo "boringcache run fallback OK"
          '

      - name: Verify bookworm-build
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            gcc --version | head -1
            pkg-config --version
            mise --version
            boringcache --version
          '

      - name: Verify mise installs Ruby
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            cd /tmp
            echo -e "[tools]\nruby = \"3.4.4\"" > mise.toml
            mise install
            ruby --version
            gem --version
          '

      - name: Verify boringcache run fallback with bundle install
        run: |
          docker run --rm ${{ env.IMAGE }}:bookworm-build sh -c '
            set -e
            cd /tmp
            echo -e "[tools]\nruby = \"3.4.4\"" > mise.toml
            mise install
            mkdir -p myapp && cd myapp
            echo "source \"https://rubygems.org\"" > Gemfile
            echo "gem \"rake\"" >> Gemfile
            export BUNDLE_PATH="vendor/bundle"
            boringcache run test-org/test gems:vendor/bundle -- bundle install
            bundle exec rake --version
          '

      - name: Summary
        run: |
          echo "## Smoke tests passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- bookworm: mise, boringcache CLI, no-token fallback" >> "$GITHUB_STEP_SUMMARY"
          echo "- bookworm-build: build tools, mise, boringcache CLI" >> "$GITHUB_STEP_SUMMARY"
          echo "- mise install: Ruby 3.4.4 from mise.toml" >> "$GITHUB_STEP_SUMMARY"
          echo "- boringcache run + bundle install: no-token fallback" >> "$GITHUB_STEP_SUMMARY"
