name: Verify Distribution

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-distribution-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify distribution
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout distribution
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check installer syntax
        run: |
          sh -n install.sh
          sh -n install-web/install.sh
          sh -n scripts/test-installer-trust.sh

      - name: Test installer trust contract
        run: scripts/test-installer-trust.sh

      - name: Check public trust files
        run: |
          test -s .github/SECURITY.md
          if grep -R -n --exclude-dir=.git 'boringcache/one@v1' README.md INSTALLATION.md docs install-web; then
            echo 'Mutable boringcache/one references are not allowed in public guidance.' >&2
            exit 1
          fi
