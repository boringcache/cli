name: E2E Tests

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/e2e-*.sh"
      - ".github/workflows/e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/e2e-*.sh"
      - ".github/workflows/e2e.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
  schedule:
    - cron: "30 5 * * *"

concurrency:
  group: e2e-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  RUST_VERSION: "1.89"
  SCCACHE_VERSION: "v0.13.0"
  BAZELISK_VERSION: "v1.20.0"

jobs:
  build-cli-binary:
    name: Build CLI Binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_DEFAULT_WORKSPACE: boringcache/cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-e2e-linux-x86_64"
          sccache: "true"
          sccache-mode: "local"
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build CLI binary
        run: cargo build --release --locked

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: e2e-cli-release-linux-amd64
          path: target/release/boringcache
          if-no-files-found: error

  e2e:
    name: E2E (${{ matrix.leg }})
    runs-on: ubuntu-latest
    needs: build-cli-binary
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - leg: integrity
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: cli-core
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: security
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: adapters-http
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: bazel-real
            needs_rust: false
            needs_sccache: false
            needs_bazel: true
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: dual-proxy
            needs_rust: false
            needs_sccache: true
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: docker-buildkit
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: true
            needs_java: false
            needs_node: false
          - leg: prefetch-readiness
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: tool-hugo
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: true
            needs_java: false
            needs_node: false
          - leg: tool-turbo
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: true
          - leg: tool-sccache
            needs_rust: true
            needs_sccache: true
            needs_bazel: false
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: tool-bazel
            needs_rust: false
            needs_sccache: false
            needs_bazel: true
            needs_docker: false
            needs_java: false
            needs_node: false
          - leg: tool-maven
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: true
            needs_node: false
          - leg: tool-gradle
            needs_rust: false
            needs_sccache: false
            needs_bazel: false
            needs_docker: false
            needs_java: true
            needs_node: false
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_E2E_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
      BORINGCACHE_E2E_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
      BORINGCACHE_DEFAULT_WORKSPACE: boringcache/cli
      RUN_SCOPED_TAGS: "1"
      SETTLE_SECS: "5"
      BUILD_TIMEOUT_SECS: "1800"
      BUILD_HEARTBEAT_SECS: "30"
      BUILD_CLEANUP_WAIT_SECS: "20"
      BUILD_FAILURE_TAIL_LINES: "120"
      PROXY_SHUTDOWN_WAIT_SECS: "30"
      RUST_LOG_LEVEL: warn

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Gate e2e leg
        id: gate
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping e2e leg: BORINGCACHE_API_TOKEN is not configured."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        if: steps.gate.outputs.run == 'true' && matrix.needs_rust == true
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-e2e-linux-x86_64"
          sccache: "true"
          sccache-mode: "local"
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.gate.outputs.run == 'true' && matrix.needs_rust == true && steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Ensure sccache present
        if: steps.gate.outputs.run == 'true' && matrix.needs_sccache == true
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --version
            exit 0
          fi
          url="https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" | tar xz -C /tmp
          sudo mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sudo chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Ensure bazel present
        if: steps.gate.outputs.run == 'true' && matrix.needs_bazel == true
        run: |
          set -euo pipefail
          if command -v bazel >/dev/null 2>&1; then
            bazel --version
            exit 0
          fi
          url="https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
          curl -fsSL "$url" -o /tmp/bazelisk
          sudo mv /tmp/bazelisk /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Setup Docker Buildx
        if: steps.gate.outputs.run == 'true' && matrix.needs_docker == true
        uses: docker/setup-buildx-action@v3

      - name: Setup Java
        if: steps.gate.outputs.run == 'true' && matrix.needs_java == true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true' && matrix.needs_node == true
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Turbo
        if: steps.gate.outputs.run == 'true' && matrix.needs_node == true
        run: npm install -g turbo

      - name: Download prebuilt CLI binary
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v8
        with:
          name: e2e-cli-release-linux-amd64
          path: ${{ runner.temp }}/boringcache-bin

      - name: Prepare CLI binary
        if: steps.gate.outputs.run == 'true'
        run: chmod +x "${RUNNER_TEMP}/boringcache-bin/boringcache"

      - name: Run e2e leg
        id: run_e2e
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/e2e-logs/${LEG}"
          mkdir -p "$LOG_DIR"
          TAG="gha-e2e-${LEG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BIN_PATH="${RUNNER_TEMP}/boringcache-bin/boringcache"
          case "$LEG" in
            integrity)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              BORINGCACHE_API_URL="https://api.boringcache.com" \
              LOG_DIR="$LOG_DIR" \
              ./scripts/e2e-cli-integrity-test.sh | tee "$LOG_DIR/run.log"
              ;;
            cli-core)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              BORINGCACHE_API_URL="https://api.boringcache.com" \
              LOG_DIR="$LOG_DIR" \
              ./scripts/e2e-cli-core-test.sh | tee "$LOG_DIR/run.log"
              ;;
            security)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              BORINGCACHE_API_URL="https://api.boringcache.com" \
              LOG_DIR="$LOG_DIR" \
              BORINGCACHE_E2E_RESTORE_TOKEN="${BORINGCACHE_E2E_RESTORE_TOKEN:-}" \
              BORINGCACHE_E2E_SAVE_TOKEN="${BORINGCACHE_E2E_SAVE_TOKEN:-}" \
              ./scripts/e2e-security-test.sh | tee "$LOG_DIR/run.log"
              ;;
            adapters-http)
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-all-adapters-http-test.sh | tee "$LOG_DIR/run.log"
              ;;
            bazel-real)
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BAZEL_BUILD_JOBS="256" \
              BAZEL_REMOTE_MAX_CONNECTIONS="64" \
              STRESS_ACTION_COUNT="96" \
              BUDGET_REMOTE_TIMEOUTS_MAX="0" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-bazel-real-test.sh | tee "$LOG_DIR/run.log"
              ;;
            dual-proxy)
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BUDGET_CONTENTION_WALL_SECONDS_MAX="480" \
              BUDGET_TOTAL_CONFLICTS_MAX="20" \
              BUDGET_PROXY_429_MAX="0" \
              BUDGET_CACHE_OPS_GET_RECORDS_MIN="300" \
              BUDGET_CACHE_OPS_GET_HIT_RATE_MAX="100" \
              BUDGET_CACHE_OPS_SCCACHE_HIT_RATE_DELTA_MAX="15" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-dual-proxy-contention-test.sh | tee "$LOG_DIR/run.log"
              ;;
            docker-buildkit)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              E2E_TAG_PREFIX="gha-cache-registry" \
              PORT="5000" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-docker-buildkit-registry-test.sh | tee "$LOG_DIR/run.log"
              ;;
            prefetch-readiness)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              TAG="gha-prefetch-readiness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              BLOB_COUNT="20000" \
              BLOB_SIZE_BYTES="4096" \
              SEED_CONCURRENCY="64" \
              VERIFY_CONCURRENCY="64" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              PROXY_SHUTDOWN_WAIT_SECS="120" \
              SEED_FLUSH_TIMEOUT_SECS="240" \
              LOG_DIR="$LOG_DIR" \
              ./scripts/e2e-prefetch-readiness-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-hugo)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              PORT="5000" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-hugo-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-turbo)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-turbo-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-sccache)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-sccache-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-bazel)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-bazel-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-maven)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-maven-test.sh | tee "$LOG_DIR/run.log"
              ;;
            tool-gradle)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-tool-gradle-test.sh | tee "$LOG_DIR/run.log"
              ;;
            *)
              echo "Unknown e2e leg: $LEG"
              exit 1
              ;;
          esac

      - name: Validate scenario coverage
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/e2e-logs/${LEG}"
          LOG_FILE="${LOG_DIR}/run.log"
          if [[ ! -f "$LOG_FILE" ]]; then
            echo "ERROR: expected e2e run log at ${LOG_FILE}"
            exit 1
          fi

          assert_log_contains() {
            local pattern="$1"
            local label="$2"
            if ! grep -Fq "$pattern" "$LOG_FILE"; then
              echo "ERROR: missing scenario marker (${label}): ${pattern}"
              echo "--- log tail ---"
              tail -n 200 "$LOG_FILE" || true
              exit 1
            fi
          }

          case "$LEG" in
            integrity)
              assert_log_contains "=== Phase 1: allow in-root relative symlinks ===" "phase1"
              assert_log_contains "=== Phase 2: reject absolute symlinks ===" "phase2"
              assert_log_contains "=== Phase 3: reject escaping relative symlinks ===" "phase3"
              assert_log_contains "CLI integrity e2e passed" "success"
              ;;
            cli-core)
              assert_log_contains "=== Phase 1: Save/restore/delete (archive cache path) ===" "phase1"
              assert_log_contains "=== Phase 2: run command cache integration ===" "phase2"
              assert_log_contains "=== Phase 3: encryption + mount sync ===" "phase3"
              assert_log_contains "CLI core e2e passed" "success"
              ;;
            security)
              assert_log_contains "=== Phase 1: Tag-name injection ===" "phase1"
              assert_log_contains "=== Phase 2: Cache poisoning via CAS tamper ===" "phase2"
              assert_log_contains "=== Phase 3: Cross-workspace isolation ===" "phase3"
              assert_log_contains "=== Phase 4: Signed restore (--require-server-signature) ===" "phase4"
              assert_log_contains "=== Phase 5: Token isolation ===" "phase5"
              assert_log_contains "Security e2e passed" "success"
              ;;
            adapters-http)
              assert_log_contains "=== Phase 1: Write and read with running proxy ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Read-only verification after proxy restart ===" "phase2"
              assert_log_contains "All adapter HTTP e2e checks passed" "success"
              ;;
            bazel-real)
              assert_log_contains "=== Phase 1: Cold build (expect local execution + upload) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm build with isolated output root (expect remote hit) ===" "phase2"
              assert_log_contains "=== Phase 2b: Verify published remote tag resolves ===" "phase2b"
              assert_log_contains "=== Phase 3: Restart proxy and verify persisted remote hit ===" "phase3"
              assert_log_contains "=== Phase 4: High-concurrency stress warm (expect remote hits, no connect timeouts) ===" "phase4"
              assert_log_contains "Bazel real-client e2e passed" "success"
              ;;
            dual-proxy)
              assert_log_contains "=== Phase 1: Prewarm (populate baseline tag) ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Dual-Proxy Contention ===" "phase2"
              assert_log_contains "=== Phase 2b: Verify published remote tag after contention flush ===" "phase2b"
              assert_log_contains "=== Phase 3: Verification (merged index check) ===" "phase3"
              assert_log_contains "PASS: both proxies flushed without timeouts/drops" "success"
              ;;
            docker-buildkit)
              assert_log_contains "=== Phase 1: Cold build and warm import ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Restart proxy and verify persisted warm import ===" "phase2"
              assert_log_contains "=== Phase 3: Implicit latest cache import compatibility ===" "phase3"
              assert_log_contains "=== Phase 4: Alias publish and alias warm import ===" "phase4"
              assert_log_contains "Docker buildkit registry e2e passed" "success"
              ;;
            prefetch-readiness)
              assert_log_contains "=== Phase 1: Seed" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Restart proxy on fresh disk cache" "phase2"
              assert_log_contains "=== Phase 3: Verify all" "phase3"
              assert_log_contains "Prefetch readiness e2e passed" "success"
              ;;
            tool-hugo)
              assert_log_contains "=== Phase 1: Cold Docker build (seed cache) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Docker build (cache hit) ===" "phase2"
              assert_log_contains "Hugo tool e2e passed" "success"
              ;;
            tool-turbo)
              assert_log_contains "=== Phase 1: Cold Turbo build (seed remote cache) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Turbo build (remote cache hit) ===" "phase2"
              assert_log_contains "Turbo tool e2e passed" "success"
              ;;
            tool-sccache)
              assert_log_contains "=== Phase 1: Cold Rust build (seed sccache via proxy) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Rust build (sccache cache hit via proxy) ===" "phase2"
              assert_log_contains "sccache tool e2e passed" "success"
              ;;
            tool-bazel)
              assert_log_contains "=== Phase 1: Cold Bazel build (seed remote cache) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Bazel build (remote cache hit) ===" "phase2"
              assert_log_contains "Bazel tool e2e passed" "success"
              ;;
            tool-maven)
              assert_log_contains "=== Phase 1: Cold Maven build (seed build cache) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Maven build (cache hit) ===" "phase2"
              assert_log_contains "Maven tool e2e passed" "success"
              ;;
            tool-gradle)
              assert_log_contains "=== Phase 1: Cold Gradle build (seed build cache) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm Gradle build (remote cache hit) ===" "phase2"
              assert_log_contains "Gradle tool e2e passed" "success"
              ;;
            *)
              echo "ERROR: unknown e2e leg: ${LEG}"
              exit 1
              ;;
          esac

      - name: Extract e2e metrics
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/e2e-logs/${LEG}"
          status="${{ steps.run_e2e.outcome }}"
          {
            echo "leg=${LEG}"
            echo "status=${status}"
          } > "${LOG_DIR}/e2e-metrics.env"

      - name: Upload e2e artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ matrix.leg }}
          path: e2e-logs/${{ matrix.leg }}
          retention-days: 14

  cross-runner-seed:
    name: Cross-Runner CAS Seed
    runs-on: ubuntu-latest
    needs: build-cli-binary
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.seed.outputs.tag }}
      cas_digest: ${{ steps.seed.outputs.cas_digest }}
      ac_digest: ${{ steps.seed.outputs.ac_digest }}
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - name: Gate
        id: gate
        run: |
          if [[ -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download CLI binary
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v8
        with:
          name: e2e-cli-release-linux-amd64
          path: ${{ runner.temp }}/bin

      - name: Checkout code
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6

      - name: Seed CAS via proxy
        id: seed
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          source ./scripts/e2e-remote-tag.sh
          CLI="${RUNNER_TEMP}/bin/boringcache"
          chmod +x "$CLI"
          TAG="gha-cross-runner-cas-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          WORK_DIR="$(mktemp -d)"
          PROXY_PORT=5050
          PROXY_URL="http://127.0.0.1:${PROXY_PORT}"
          PROXY_LOG="${WORK_DIR}/proxy.log"

          CAS_PAYLOAD="${WORK_DIR}/cas-payload.bin"
          dd if=/dev/urandom bs=1024 count=64 2>/dev/null | base64 > "$CAS_PAYLOAD"
          CAS_DIGEST="$(sha256sum "$CAS_PAYLOAD" | awk '{print $1}')"

          AC_PAYLOAD="${WORK_DIR}/ac-payload.bin"
          printf 'cross-runner-ac-%s-%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" > "$AC_PAYLOAD"
          AC_DIGEST="$(sha256sum "$AC_PAYLOAD" | awk '{print $1}')"

          RUST_LOG=info "$CLI" cache-registry "${{ github.repository }}" "$TAG" \
            --host 127.0.0.1 --port "$PROXY_PORT" --no-platform --no-git \
            >>"$PROXY_LOG" 2>&1 &
          PROXY_PID=$!

          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "${PROXY_URL}/v2/" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$PROXY_PID" 2>/dev/null; then
              echo "ERROR: proxy exited during startup"
              cat "$PROXY_LOG"
              exit 1
            fi
            sleep 1
          done

          echo "Proxy ready, writing CAS + AC blobs..."
          curl -fsS --max-time 30 -X PUT --data-binary "@${CAS_PAYLOAD}" -o /dev/null -w "CAS PUT: %{http_code}\n" "${PROXY_URL}/cas/${CAS_DIGEST}"
          curl -fsS --max-time 30 -X PUT --data-binary "@${AC_PAYLOAD}" -o /dev/null -w "AC PUT: %{http_code}\n" "${PROXY_URL}/ac/${AC_DIGEST}"

          echo "Verifying blobs readable on same proxy..."
          curl -fsS --max-time 30 -o "${WORK_DIR}/cas-verify.bin" "${PROXY_URL}/cas/${CAS_DIGEST}"
          if ! cmp -s "$CAS_PAYLOAD" "${WORK_DIR}/cas-verify.bin"; then
            echo "ERROR: CAS blob readback mismatch on seed runner"
            exit 1
          fi
          curl -fsS --max-time 30 -o "${WORK_DIR}/ac-verify.bin" "${PROXY_URL}/ac/${AC_DIGEST}"
          if ! cmp -s "$AC_PAYLOAD" "${WORK_DIR}/ac-verify.bin"; then
            echo "ERROR: AC blob readback mismatch on seed runner"
            exit 1
          fi

          echo "Flushing proxy (graceful shutdown)..."
          kill "$PROXY_PID"
          wait "$PROXY_PID" 2>/dev/null || true

          echo "Waiting for published remote tag before handing off to fresh runner..."
          verify_remote_tag_visible \
            "$CLI" \
            "${{ github.repository }}" \
            "$TAG" \
            "${WORK_DIR}/publish-check" \
            1 \
            45 \
            2 \
            "$PROXY_LOG"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "cas_digest=${CAS_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "ac_digest=${AC_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Seed complete: tag=${TAG} cas=${CAS_DIGEST} ac=${AC_DIGEST}"

  cross-runner-verify:
    name: Cross-Runner CAS Verify
    runs-on: ubuntu-latest
    needs: [build-cli-binary, cross-runner-seed]
    if: needs.cross-runner-seed.outputs.tag != ''
    timeout-minutes: 10
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - name: Download CLI binary
        uses: actions/download-artifact@v8
        with:
          name: e2e-cli-release-linux-amd64
          path: ${{ runner.temp }}/bin

      - name: Verify CAS on fresh runner via proxy
        run: |
          set -euo pipefail
          CLI="${RUNNER_TEMP}/bin/boringcache"
          chmod +x "$CLI"
          TAG="${{ needs.cross-runner-seed.outputs.tag }}"
          CAS_DIGEST="${{ needs.cross-runner-seed.outputs.cas_digest }}"
          AC_DIGEST="${{ needs.cross-runner-seed.outputs.ac_digest }}"
          WORK_DIR="$(mktemp -d)"
          PROXY_PORT=5050
          PROXY_URL="http://127.0.0.1:${PROXY_PORT}"
          PROXY_LOG="${WORK_DIR}/proxy.log"

          RUST_LOG=info "$CLI" cache-registry "${{ github.repository }}" "$TAG" \
            --host 127.0.0.1 --port "$PROXY_PORT" --no-platform --no-git \
            >>"$PROXY_LOG" 2>&1 &
          PROXY_PID=$!

          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "${PROXY_URL}/v2/" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$PROXY_PID" 2>/dev/null; then
              echo "ERROR: proxy exited during startup"
              cat "$PROXY_LOG"
              exit 1
            fi
            sleep 1
          done

          echo "Proxy ready on fresh runner, verifying CAS blobs..."
          CAS_STATUS="$(curl -sS --max-time 30 -o "${WORK_DIR}/cas-restored.bin" -w "%{http_code}" "${PROXY_URL}/cas/${CAS_DIGEST}")"
          if [[ "$CAS_STATUS" != "200" ]]; then
            echo "ERROR: CAS GET returned ${CAS_STATUS} (expected 200)"
            tail -n 60 "$PROXY_LOG"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          CAS_ACTUAL="$(sha256sum "${WORK_DIR}/cas-restored.bin" | awk '{print $1}')"
          if [[ "$CAS_ACTUAL" != "$CAS_DIGEST" ]]; then
            echo "ERROR: CAS content mismatch (expected=${CAS_DIGEST} actual=${CAS_ACTUAL})"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          echo "CAS blob verified: digest matches"

          AC_STATUS="$(curl -sS --max-time 30 -o "${WORK_DIR}/ac-restored.bin" -w "%{http_code}" "${PROXY_URL}/ac/${AC_DIGEST}")"
          if [[ "$AC_STATUS" != "200" ]]; then
            echo "ERROR: AC GET returned ${AC_STATUS} (expected 200)"
            tail -n 60 "$PROXY_LOG"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          AC_ACTUAL="$(sha256sum "${WORK_DIR}/ac-restored.bin" | awk '{print $1}')"
          if [[ "$AC_ACTUAL" != "$AC_DIGEST" ]]; then
            echo "ERROR: AC content mismatch (expected=${AC_DIGEST} actual=${AC_ACTUAL})"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          echo "AC blob verified: digest matches"

          echo "Cross-runner CAS persistence verified"
          kill "$PROXY_PID" 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          CLI="${RUNNER_TEMP}/bin/boringcache"
          TAG="${{ needs.cross-runner-seed.outputs.tag }}"
          "$CLI" delete --no-platform --no-git "${{ github.repository }}" "${TAG}" || true

  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs:
      - e2e
      - cross-runner-verify
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "e2e-logs-*"
          path: artifacts

      - name: Write summary
        run: |
          set -euo pipefail
          echo "# E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Leg | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"

          mapfile -t metric_files < <(find artifacts -type f -name e2e-metrics.env 2>/dev/null | sort)
          for metrics in "${metric_files[@]}"; do
            # shellcheck disable=SC1090
            source "$metrics"
            echo "| ${leg} | ${status} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Cross-Runner Cache Persistence" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cross_runner_status="${{ needs.cross-runner-verify.result }}"
          echo "| Test | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CAS blob persistence across runners | ${cross_runner_status} |" >> "$GITHUB_STEP_SUMMARY"
