name: CLI CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
  BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
  SCCACHE_VERSION: "v0.14.0"
  CARGO_INCREMENTAL: "0"

jobs:
  test-boringcache:
    name: Test CLI (BoringCache)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Rust version
        id: rust-version
        run: echo "version=$(./scripts/rust-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          workspace: ${{ github.repository }}
          rust-version: ${{ steps.rust-version.outputs.version }}
          cache-tag: "rust-${{ steps.rust-version.outputs.version }}-ci-test"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "false"

      - name: Setup Rust (Fallback)
        if: steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Build and test with timing
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
          BORINGCACHE_CARGO_FLOW_MODE: plain
        run: |
          set -euo pipefail
          START_TIME=$(date +%s%N)
          ./scripts/cargo-flow.sh build
          ./scripts/cargo-flow.sh test
          ./scripts/cargo-flow.sh clippy
          ./scripts/cargo-flow.sh compat
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "BoringCache build+test: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/boringcache.txt

          echo "=== sccache stats ==="
          SCCACHE_STATS="$(sccache --show-stats || true)"
          echo "${SCCACHE_STATS}"
          COMPILE_REQUESTS="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Compile" && $2 == "requests" { print $3; exit }')"
          CACHE_HITS="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "hits" && $3 ~ /^[0-9]+$/ { print $3; exit }')"
          CACHE_MISSES="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "misses" && $3 ~ /^[0-9]+$/ { print $3; exit }')"
          RUST_HIT_RATE="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "hits" && $3 == "rate" && $4 == "(Rust)" { print $(NF-1); exit }')"
          COMPILE_REQUESTS="${COMPILE_REQUESTS:-0}"
          CACHE_HITS="${CACHE_HITS:-0}"
          CACHE_MISSES="${CACHE_MISSES:-0}"
          RUST_HIT_RATE="${RUST_HIT_RATE:-0.00}"
          printf "compile_requests,cache_hits,cache_misses,rust_hit_rate\n%s,%s,%s,%s\n" \
            "${COMPILE_REQUESTS}" "${CACHE_HITS}" "${CACHE_MISSES}" "${RUST_HIT_RATE}" \
            > benchmark-results/boringcache-stats.csv

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: boringcache-results
          path: benchmark-results/

  warm-macos-debug-cache:
    name: Warm CLI debug cache (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Rust version
        id: rust-version
        run: echo "version=$(./scripts/rust-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          workspace: ${{ github.repository }}
          rust-version: ${{ steps.rust-version.outputs.version }}
          cache-tag: "rust-${{ steps.rust-version.outputs.version }}-ci-build-aarch64-apple-darwin"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "true"
          target-tag: "cargo-target-debug-rust-${{ steps.rust-version.outputs.version }}-aarch64-apple-darwin"
          sccache-tag: "rust-${{ steps.rust-version.outputs.version }}-sccache-debug-aarch64-apple-darwin"

      - name: Setup Rust (Fallback)
        if: steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}

      - name: Warm debug cache via cargo-flow
        env:
          BORINGCACHE_CARGO_FLOW_MODE: plain
        run: ./scripts/cargo-flow.sh build

  build:
    name: Build CLI - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux glibc build (native runner — Ubuntu 22.04 = glibc 2.35)
          - runner: ubuntu-22.04
            name: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-linux-amd64
            use_docker: false

          # Linux musl build (static, for Alpine/minimal containers)
          - runner: ubuntu-latest
            name: linux-musl-amd64
            container: alpine:3.21
            target: x86_64-unknown-linux-musl
            cli_platform: alpine-amd64
            binary_name: boringcache-linux-musl-amd64
            use_docker: true
            musl: true
          
          # macOS builds (GitHub-hosted native)
          - runner: macos-15
            name: macos-15-arm64
            target: aarch64-apple-darwin
            binary_name: boringcache-macos-universal
            use_docker: false
          
          # Windows builds (GitHub-hosted native)
          - runner: windows-2022
            name: windows-2022-amd64
            target: x86_64-pc-windows-msvc
            binary_name: boringcache-windows-amd64.exe
            use_docker: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Rust version
        id: rust-version
        shell: bash
        run: echo "version=$(./scripts/rust-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Setup BoringCache Docker cache
        id: boringcache-docker-build
        if: matrix.use_docker == true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          cache-runtime: "false"
          mode: docker
          cli-platform: ${{ matrix.cli_platform }}
          workspace: ${{ github.repository }}
          image: boringcache-cli-ci-build-${{ matrix.name }}
          tags: latest
          context: .
          dockerfile: .github/docker/base-image.Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.container }}
            RUST_VERSION=${{ steps.rust-version.outputs.version }}
            RUST_TARGET=${{ matrix.target }}
            SCCACHE_VERSION=${{ env.SCCACHE_VERSION }}
          cache-tag: "docker-ci-build-env-${{ matrix.name }}"
          registry-tag: "docker-ci-build-env-${{ matrix.name }}"
          push: "false"
          load: "true"
          save-always: "true"

      - name: Copy Docker build tools for mount
        if: matrix.use_docker == true
        run: |
          set -eu
          if command -v boringcache >/dev/null 2>&1; then
            cp "$(command -v boringcache)" "${RUNNER_TEMP}/boringcache-bin"
            chmod +x "${RUNNER_TEMP}/boringcache-bin"
            echo "BORINGCACHE_BIN_PATH=${RUNNER_TEMP}/boringcache-bin" >> "${GITHUB_ENV}"
          fi

      # Docker builds for Debian/Alpine
      - name: Build in Docker container
        if: matrix.use_docker == true
        run: |
          DOCKER_IMAGE="${{ matrix.container }}"
          docker_args=(
            --rm
            -v "$PWD:/workspace"
            -w /workspace
            -e CARGO_TARGET_DIR=/workspace/target
            -e CARGO_INCREMENTAL=${{ env.CARGO_INCREMENTAL }}
            -e BORINGCACHE_RESTORE_TOKEN=${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
            -e BORINGCACHE_SAVE_TOKEN=${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          )
          if docker image inspect "boringcache-cli-ci-build-${{ matrix.name }}:latest" >/dev/null 2>&1; then
            DOCKER_IMAGE="boringcache-cli-ci-build-${{ matrix.name }}:latest"
          fi
          if [ -n "${BORINGCACHE_BIN_PATH:-}" ] && [ -f "${BORINGCACHE_BIN_PATH}" ]; then
            docker_args+=(-v "${BORINGCACHE_BIN_PATH}:/usr/local/bin/boringcache:ro")
          elif command -v boringcache >/dev/null 2>&1; then
            docker_args+=(-v "$(command -v boringcache):/usr/local/bin/boringcache:ro")
          fi
          docker run "${docker_args[@]}" \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              USE_SCCACHE_PROXY=0

              # Install build dependencies based on container type
              if [ -f /etc/alpine-release ]; then
                if ! command -v cargo >/dev/null 2>&1; then
                  apk add --no-cache bash build-base ca-certificates curl perl make musl-dev tar xz
                  curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ steps.rust-version.outputs.version }}
                fi
                export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"
              elif [ -f /etc/debian_version ]; then
                if ! command -v cargo >/dev/null 2>&1; then
                  apt-get update
                  apt-get install -y build-essential pkg-config libssl-dev curl ca-certificates xz-utils
                  curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ steps.rust-version.outputs.version }}
                fi
                export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"
              fi

              # Install sccache so boringcache can wire it when available.
              BORINGCACHE_VERSION="$(boringcache --version 2>/dev/null || true)"
              if [ -n "${BORINGCACHE_VERSION}" ]; then
                echo "container boringcache: ${BORINGCACHE_VERSION}"
                if ! command -v sccache >/dev/null 2>&1; then
                  SCCACHE_ARCH="$(uname -m)"
                  SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/sccache-${{ env.SCCACHE_VERSION }}-${SCCACHE_ARCH}-unknown-linux-musl.tar.gz"
                  if curl -fsSL "$SCCACHE_URL" | tar xz -C /tmp; then
                    mv "/tmp/sccache-${{ env.SCCACHE_VERSION }}-${SCCACHE_ARCH}-unknown-linux-musl/sccache" /usr/local/bin/sccache
                    chmod +x /usr/local/bin/sccache
                  fi
                fi
                if command -v sccache >/dev/null 2>&1; then
                  sccache --version
                  USE_SCCACHE_PROXY=1
                fi
              else
                echo "::warning::Container boringcache CLI is unavailable; skipping proxy-backed sccache."
              fi

              # Add target
              rustup target add ${{ matrix.target }}

              # Build with appropriate flags.
              if [ "${USE_SCCACHE_PROXY}" = "1" ]; then
                export SCCACHE_SERVER_PORT=4227
                if [ "${{ matrix.musl }}" = "true" ]; then
                  boringcache sccache \
                    --workspace ${{ github.repository }} \
                    --tag "rust-${{ steps.rust-version.outputs.version }}-sccache-${{ matrix.name }}" \
                    --host 127.0.0.1 \
                    --port "${SCCACHE_SERVER_PORT}" \
                    --no-platform \
                    --no-git \
                    -- sh -c "sccache --start-server || true; status=0; RUSTFLAGS='-C target-feature=+crt-static' BORINGCACHE_CARGO_FLOW_MODE=plain ./scripts/cargo-flow.sh build --release --target ${{ matrix.target }} || status=\$?; sccache --show-stats || true; sccache --stop-server >/dev/null 2>&1 || true; exit \$status"
                else
                  boringcache sccache \
                    --workspace ${{ github.repository }} \
                    --tag "rust-${{ steps.rust-version.outputs.version }}-sccache-${{ matrix.name }}" \
                    --host 127.0.0.1 \
                    --port "${SCCACHE_SERVER_PORT}" \
                    --no-platform \
                    --no-git \
                    -- sh -c "sccache --start-server || true; status=0; BORINGCACHE_CARGO_FLOW_MODE=plain ./scripts/cargo-flow.sh build --release --target ${{ matrix.target }} || status=\$?; sccache --show-stats || true; sccache --stop-server >/dev/null 2>&1 || true; exit \$status"
                fi
              elif [ "${{ matrix.musl }}" = "true" ]; then
                RUSTFLAGS="-C target-feature=+crt-static" BORINGCACHE_CARGO_FLOW_MODE=plain ./scripts/cargo-flow.sh build --release --target ${{ matrix.target }}
              else
                BORINGCACHE_CARGO_FLOW_MODE=plain ./scripts/cargo-flow.sh build --release --target ${{ matrix.target }}
              fi

              # Copy binary
              cp target/${{ matrix.target }}/release/boringcache /workspace/${{ matrix.binary_name }}
              chmod +x /workspace/${{ matrix.binary_name }}
            '

      # Native builds for Ubuntu/macOS/Windows
      - name: Setup Rust (Native builds)
        id: boringcache-rust-native
        if: matrix.use_docker != true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          cache-runtime: "false"
          mode: rust-sccache
          workspace: ${{ github.repository }}
          rust-version: ${{ steps.rust-version.outputs.version }}
          cache-tag: "rust-${{ steps.rust-version.outputs.version }}-ci-build-${{ matrix.name }}"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "false"

      - name: Setup Rust (Native Fallback)
        if: matrix.use_docker != true && steps.boringcache-rust-native.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: ${{ matrix.target }}

      - name: Normalize Windows compiler env
        if: matrix.use_docker != true && runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust target (Native builds)
        if: matrix.use_docker != true
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI (Native builds)
        if: matrix.use_docker != true
        shell: bash
        env:
          BORINGCACHE_CARGO_FLOW_MODE: plain
        run: |
          set -euo pipefail
          ./scripts/cargo-flow.sh build --release --target ${{ matrix.target }}

      - name: Prepare binary (Native builds)
        if: matrix.use_docker != true
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/boringcache.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/boringcache ${{ matrix.binary_name }}
            chmod +x ${{ matrix.binary_name }}
          fi
