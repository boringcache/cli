name: CLI CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  RUST_VERSION: "1.89"
  BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
  SCCACHE_VERSION: "v0.13.0"
  CARGO_INCREMENTAL: "0"

jobs:
  test-boringcache:
    name: Test CLI (BoringCache)
    runs-on: ubuntu-latest
    concurrency:
      group: cli-ci-native-bench-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-ci-test"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Build and test with timing
        run: |
          set -euo pipefail
          PROXY_PID=""

          cleanup() {
            sccache --stop-server >/dev/null 2>&1 || true
            if [[ -n "${PROXY_PID}" ]]; then
              kill "${PROXY_PID}" >/dev/null 2>&1 || true
              wait "${PROXY_PID}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          if command -v boringcache >/dev/null 2>&1 && command -v sccache >/dev/null 2>&1; then
            SCCACHE_PORT=4228
            boringcache cache-registry ${{ github.repository }} "rust-${{ env.RUST_VERSION }}-sccache-native-test" \
              --host 127.0.0.1 --port "$SCCACHE_PORT" --no-platform --no-git &
            PROXY_PID=$!
            PROXY_READY=0
            for _ in $(seq 1 30); do
              if curl -fsS --max-time 1 "http://127.0.0.1:${SCCACHE_PORT}/v2/" >/dev/null 2>&1; then
                PROXY_READY=1
                break
              fi
              sleep 0.5
            done
            if [[ "${PROXY_READY}" == "1" ]]; then
              export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${SCCACHE_PORT}/"
              export RUSTC_WRAPPER=sccache
              echo "sccache proxy configured: endpoint=$SCCACHE_WEBDAV_ENDPOINT"
              sccache --stop-server >/dev/null 2>&1 || true
              sccache --start-server || true
              sccache --zero-stats >/dev/null 2>&1 || true
            else
              echo "sccache proxy not ready; continuing without remote cache backend"
              kill "${PROXY_PID}" >/dev/null 2>&1 || true
              wait "${PROXY_PID}" >/dev/null 2>&1 || true
              PROXY_PID=""
            fi
          fi

          export CARGO_TARGET_DIR="${GITHUB_WORKSPACE}/target"
          START_TIME=$(date +%s%N)
          cargo build --locked
          cargo test --locked
          cargo clippy --locked -- -D warnings
          END_TIME=$(date +%s%N)
          DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
          echo "BoringCache build+test: ${DURATION}ms"
          mkdir -p benchmark-results
          echo "${DURATION}" > benchmark-results/boringcache.txt

          echo "=== sccache stats ==="
          SCCACHE_STATS="$(sccache --show-stats || true)"
          echo "${SCCACHE_STATS}"
          COMPILE_REQUESTS="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Compile" && $2 == "requests" { print $3; exit }')"
          CACHE_HITS="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "hits" && $3 ~ /^[0-9]+$/ { print $3; exit }')"
          CACHE_MISSES="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "misses" && $3 ~ /^[0-9]+$/ { print $3; exit }')"
          RUST_HIT_RATE="$(printf '%s\n' "${SCCACHE_STATS}" | awk '$1 == "Cache" && $2 == "hits" && $3 == "rate" && $4 == "(Rust)" { print $(NF-1); exit }')"
          COMPILE_REQUESTS="${COMPILE_REQUESTS:-0}"
          CACHE_HITS="${CACHE_HITS:-0}"
          CACHE_MISSES="${CACHE_MISSES:-0}"
          RUST_HIT_RATE="${RUST_HIT_RATE:-0.00}"
          printf "compile_requests,cache_hits,cache_misses,rust_hit_rate\n%s,%s,%s,%s\n" \
            "${COMPILE_REQUESTS}" "${CACHE_HITS}" "${CACHE_MISSES}" "${RUST_HIT_RATE}" \
            > benchmark-results/boringcache-stats.csv

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: boringcache-results
          path: benchmark-results/

  docker:
    name: Test Docker
    runs-on: ubuntu-latest
    concurrency:
      group: cli-ci-docker-bench-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup BoringCache Docker cache
        id: boringcache-docker-test
        continue-on-error: true
        uses: boringcache/docker-action@v1
        with:
          workspace: ${{ github.repository }}
          image: boringcache-cli-ci-docker-test
          tags: latest
          context: .
          dockerfile: .github/docker/base-image.Dockerfile
          build-args: |
            BASE_IMAGE=rust:${{ env.RUST_VERSION }}-bookworm
          cache-tag: "docker-ci-rust-${{ env.RUST_VERSION }}-bookworm"
          registry-tag: "docker-ci-rust-${{ env.RUST_VERSION }}-bookworm"
          push: "false"
          load: "true"

      - name: Copy BoringCache CLI for Docker mount
        run: |
          set -eu
          if command -v boringcache >/dev/null 2>&1; then
            cp "$(command -v boringcache)" "${RUNNER_TEMP}/boringcache-bin"
            chmod +x "${RUNNER_TEMP}/boringcache-bin"
            echo "BORINGCACHE_BIN_PATH=${RUNNER_TEMP}/boringcache-bin" >> "${GITHUB_ENV}"
          fi

      - name: Build and test with timing
        run: |
          BC_MOUNT=""
          DOCKER_IMAGE="rust:${{ env.RUST_VERSION }}-bookworm"
          if docker image inspect "boringcache-cli-ci-docker-test:latest" >/dev/null 2>&1; then
            DOCKER_IMAGE="boringcache-cli-ci-docker-test:latest"
          fi
          if [ -n "${BORINGCACHE_BIN_PATH:-}" ] && [ -f "${BORINGCACHE_BIN_PATH}" ]; then
            BC_MOUNT="-v ${BORINGCACHE_BIN_PATH}:/usr/local/bin/boringcache:ro"
          elif command -v boringcache >/dev/null 2>&1; then
            BC_MOUNT="-v $(command -v boringcache):/usr/local/bin/boringcache:ro"
          fi
          docker run --rm \
            -v "$PWD:/workspace" \
            $BC_MOUNT \
            -w /workspace \
            -e CARGO_TARGET_DIR=/workspace/target \
            -e CARGO_INCREMENTAL=${{ env.CARGO_INCREMENTAL }} \
            -e BORINGCACHE_API_TOKEN=${{ secrets.BORINGCACHE_API_TOKEN }} \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              PROXY_PID=""

              cleanup() {
                if command -v sccache >/dev/null 2>&1; then
                  sccache --stop-server >/dev/null 2>&1 || true
                fi
                if [ -n "${PROXY_PID}" ]; then
                  kill "${PROXY_PID}" >/dev/null 2>&1 || true
                  wait "${PROXY_PID}" >/dev/null 2>&1 || true
                fi
              }
              trap cleanup EXIT

              # Install sccache + start proxy for compilation caching
              if boringcache --version >/dev/null 2>&1; then
                SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/sccache-${{ env.SCCACHE_VERSION }}-x86_64-unknown-linux-musl.tar.gz"
                if curl -fsSL "$SCCACHE_URL" | tar xz -C /tmp; then
                  mv "/tmp/sccache-${{ env.SCCACHE_VERSION }}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
                  chmod +x /usr/local/bin/sccache
                  sccache --version

                  SCCACHE_PORT=4227
                  # Keep a stable root tag in normal CI to preserve key->digest mappings across runs.
                  boringcache cache-registry ${{ github.repository }} "rust-${{ env.RUST_VERSION }}-sccache-docker-test" \
                    --host 127.0.0.1 --port "$SCCACHE_PORT" --no-platform --no-git &
                  PROXY_PID=$!
                  PROXY_READY=0
                  for _ in $(seq 1 30); do
                    if curl -fsS --max-time 1 "http://127.0.0.1:${SCCACHE_PORT}/v2/" >/dev/null 2>&1; then
                      PROXY_READY=1
                      break
                    fi
                    sleep 0.5
                  done
                  if [ "${PROXY_READY}" = "1" ]; then
                    export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${SCCACHE_PORT}/"
                    export RUSTC_WRAPPER=sccache
                    echo "sccache proxy configured: endpoint=$SCCACHE_WEBDAV_ENDPOINT"
                    sccache --start-server || true
                    sccache --zero-stats >/dev/null 2>&1 || true
                  else
                    echo "sccache proxy not ready; continuing without remote cache backend"
                    kill "${PROXY_PID}" >/dev/null 2>&1 || true
                    wait "${PROXY_PID}" >/dev/null 2>&1 || true
                    PROXY_PID=""
                  fi
                fi
              fi

              # Build with timing
              START_TIME=$(date +%s%N)
              if boringcache --version >/dev/null 2>&1 && [ -n "${BORINGCACHE_API_TOKEN:-}" ]; then
                TARGET_CACHE_KEY="rust-${{ env.RUST_VERSION }}-docker-target-ci-bookworm:/workspace/target"
                boringcache run ${{ github.repository }} "$TARGET_CACHE_KEY" --no-platform --no-git -- sh -c "cargo build --locked && cargo test --locked"
              else
                cargo build --locked
                cargo test --locked
              fi
              END_TIME=$(date +%s%N)
              DURATION=$(( (END_TIME - START_TIME) / 1000000 ))
              echo "Docker target cache: ${DURATION}ms"
              mkdir -p benchmark-results
              echo "${DURATION}" > benchmark-results/docker-target.txt

              echo "=== sccache stats ==="
              SCCACHE_STATS="$(sccache --show-stats || true)"
              echo "${SCCACHE_STATS}"
              COMPILE_REQUESTS="$(printf "%s\n" "${SCCACHE_STATS}" | sed -n "s/^Compile requests[[:space:]]\\+\\([0-9]\\+\\)$/\\1/p" | head -n 1)"
              CACHE_HITS="$(printf "%s\n" "${SCCACHE_STATS}" | sed -n "s/^Cache hits[[:space:]]\\+\\([0-9]\\+\\)$/\\1/p" | head -n 1)"
              CACHE_MISSES="$(printf "%s\n" "${SCCACHE_STATS}" | sed -n "s/^Cache misses[[:space:]]\\+\\([0-9]\\+\\)$/\\1/p" | head -n 1)"
              RUST_HIT_RATE="$(printf "%s\n" "${SCCACHE_STATS}" | sed -n "s/^Cache hits rate (Rust)[[:space:]]\\+\\([0-9.][0-9.]*\\)[[:space:]]*%$/\\1/p" | head -n 1)"
              COMPILE_REQUESTS="${COMPILE_REQUESTS:-0}"
              CACHE_HITS="${CACHE_HITS:-0}"
              CACHE_MISSES="${CACHE_MISSES:-0}"
              RUST_HIT_RATE="${RUST_HIT_RATE:-0.00}"
              printf "compile_requests,cache_hits,cache_misses,rust_hit_rate\n%s,%s,%s,%s\n" \
                "${COMPILE_REQUESTS}" "${CACHE_HITS}" "${CACHE_MISSES}" "${RUST_HIT_RATE}" \
                > benchmark-results/docker-target-stats.csv

            '

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: docker-target-results
          path: benchmark-results/

  benchmark-summary:
    name: Cache Benchmark Summary
    runs-on: ubuntu-latest
    needs:
      - test-boringcache
      - docker
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: "*-results*"
          merge-multiple: true

      - name: Generate summary
        run: |
          set -euo pipefail
          echo "# Rust Build Cache Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | Status | Time (ms) | Compile Requests | Hits | Misses | Hit Rate | Rust Hit Rate |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|--------|-----------|------------------|------|--------|----------|---------------|" >> "$GITHUB_STEP_SUMMARY"

          write_row() {
            local label="$1"
            local time_file="$2"
            local stats_file="$3"
            local status="Missing"
            local time_ms="-"
            local compile_requests="-"
            local cache_hits="-"
            local cache_misses="-"
            local hit_rate="-"
            local rust_hit_rate="-"

            if [[ -f "$time_file" && -f "$stats_file" ]]; then
              status="OK"
              time_ms="$(cat "$time_file")"
              IFS=',' read -r compile_requests cache_hits cache_misses rust_hit_rate < <(tail -n 1 "$stats_file")
              hit_rate="0.00"
              if [[ "$compile_requests" -gt 0 ]]; then
                hit_rate="$(awk -v hits="$cache_hits" -v total="$compile_requests" 'BEGIN { printf "%.2f", (hits * 100) / total }')"
              fi
              rust_hit_rate="${rust_hit_rate:-0.00}"
              echo "$label:$time_ms" >> /tmp/ci-summary-times.txt
            fi

            echo "| ${label} | ${status} | ${time_ms} | ${compile_requests} | ${cache_hits} | ${cache_misses} | ${hit_rate}% | ${rust_hit_rate}% |" >> "$GITHUB_STEP_SUMMARY"
          }

          : > /tmp/ci-summary-times.txt
          write_row "Native" "boringcache.txt" "boringcache-stats.csv"
          write_row "Docker" "docker-target.txt" "docker-target-stats.csv"

          native_time="$(sed -n 's/^Native:\([0-9][0-9]*\)$/\1/p' /tmp/ci-summary-times.txt | tail -1)"
          docker_time="$(sed -n 's/^Docker:\([0-9][0-9]*\)$/\1/p' /tmp/ci-summary-times.txt | tail -1)"
          if [[ -n "$native_time" && -n "$docker_time" ]]; then
            delta=$((docker_time - native_time))
            pct="$(awk -v d="$delta" -v n="$native_time" 'BEGIN { if (n == 0) { print "0.00" } else { printf "%.2f", (d * 100) / n } }')"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Docker vs Native delta: ${delta}ms (${pct}%)" >> "$GITHUB_STEP_SUMMARY"
          fi

  build:
    name: Build CLI - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Ubuntu builds (GitHub-hosted native)
          - runner: ubuntu-22.04
            name: ubuntu-22.04-amd64
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-ubuntu-22.04-amd64
            use_docker: false
          
          - runner: ubuntu-24.04
            name: ubuntu-24.04-amd64
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-ubuntu-24.04-amd64
            use_docker: false

          # Ubuntu 25.04 build (Docker on GitHub-hosted)
          - runner: ubuntu-latest
            name: ubuntu-25.04-amd64
            container: ubuntu:25.04
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-ubuntu-25.04-amd64
            use_docker: true

          # Debian build sample (Docker on GitHub-hosted)
          - runner: ubuntu-latest
            name: debian-bookworm-amd64
            container: rust:1.89-bookworm
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-debian-bookworm-amd64
            use_docker: true
          
          # Alpine build sample (Docker on GitHub-hosted)
          - runner: ubuntu-latest
            name: alpine-amd64
            container: rust:1.89-alpine
            target: x86_64-unknown-linux-musl
            binary_name: boringcache-alpine-amd64
            use_docker: true
            musl: true
          
          # macOS builds (GitHub-hosted native)
          - runner: macos-15
            name: macos-15-arm64
            target: aarch64-apple-darwin
            binary_name: boringcache-macos-15-arm64
            use_docker: false
          
          # Windows builds (GitHub-hosted native)
          - runner: windows-2022
            name: windows-2022-amd64
            target: x86_64-pc-windows-msvc
            binary_name: boringcache-windows-2022-amd64.exe
            use_docker: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup BoringCache Docker cache
        id: boringcache-docker-build
        if: matrix.use_docker == true
        continue-on-error: true
        uses: boringcache/docker-action@v1
        with:
          workspace: ${{ github.repository }}
          image: boringcache-cli-ci-build-${{ matrix.name }}
          tags: latest
          context: .
          dockerfile: .github/docker/base-image.Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.container }}
          cache-tag: "docker-ci-build-base-${{ matrix.name }}"
          registry-tag: "docker-ci-build-base-${{ matrix.name }}"
          push: "false"
          load: "true"

      - name: Copy BoringCache CLI for Docker mount
        if: matrix.use_docker == true
        run: |
          set -eu
          if command -v boringcache >/dev/null 2>&1; then
            cp "$(command -v boringcache)" "${RUNNER_TEMP}/boringcache-bin"
            chmod +x "${RUNNER_TEMP}/boringcache-bin"
            echo "BORINGCACHE_BIN_PATH=${RUNNER_TEMP}/boringcache-bin" >> "${GITHUB_ENV}"
          fi

      # Docker builds for Debian/Alpine
      - name: Build in Docker container
        if: matrix.use_docker == true
        run: |
          BC_MOUNT=""
          DOCKER_IMAGE="${{ matrix.container }}"
          if docker image inspect "boringcache-cli-ci-build-${{ matrix.name }}:latest" >/dev/null 2>&1; then
            DOCKER_IMAGE="boringcache-cli-ci-build-${{ matrix.name }}:latest"
          fi
          if [ -n "${BORINGCACHE_BIN_PATH:-}" ] && [ -f "${BORINGCACHE_BIN_PATH}" ]; then
            BC_MOUNT="-v ${BORINGCACHE_BIN_PATH}:/usr/local/bin/boringcache:ro"
          elif command -v boringcache >/dev/null 2>&1; then
            BC_MOUNT="-v $(command -v boringcache):/usr/local/bin/boringcache:ro"
          fi
          docker run --rm \
            -v "$PWD:/workspace" \
            $BC_MOUNT \
            -w /workspace \
            -e CARGO_TARGET_DIR=/workspace/target \
            -e CARGO_INCREMENTAL=${{ env.CARGO_INCREMENTAL }} \
            -e BORINGCACHE_API_TOKEN=${{ secrets.BORINGCACHE_API_TOKEN }} \
            "$DOCKER_IMAGE" \
            sh -c '
              set -eu
              PROXY_PID=""

              # Install build dependencies based on container type
              if [ -f /etc/alpine-release ]; then
                apk add --no-cache build-base musl-dev curl
              elif [ -f /etc/debian_version ]; then
                apt-get update
                apt-get install -y build-essential pkg-config libssl-dev curl
                if ! command -v rustup >/dev/null 2>&1; then
                  curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }}
                  export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"
                fi
              fi

              # Install sccache + start proxy for compilation caching
              if boringcache --version >/dev/null 2>&1; then
                SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/sccache-${{ env.SCCACHE_VERSION }}-x86_64-unknown-linux-musl.tar.gz"
                if curl -fsSL "$SCCACHE_URL" | tar xz -C /tmp; then
                  mv "/tmp/sccache-${{ env.SCCACHE_VERSION }}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
                  chmod +x /usr/local/bin/sccache
                  sccache --version

                  SCCACHE_PORT=4227
                  boringcache cache-registry ${{ github.repository }} "rust-${{ env.RUST_VERSION }}-sccache-${{ matrix.name }}" \
                    --host 127.0.0.1 --port "$SCCACHE_PORT" --no-platform --no-git &
                  PROXY_PID=$!
                  PROXY_READY=0
                  for _ in $(seq 1 30); do
                    if curl -fsS --max-time 1 "http://127.0.0.1:${SCCACHE_PORT}/v2/" >/dev/null 2>&1; then
                      PROXY_READY=1
                      break
                    fi
                    sleep 0.5
                  done
                  if [ "${PROXY_READY}" = "1" ]; then
                    export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${SCCACHE_PORT}/"
                    export RUSTC_WRAPPER=sccache
                    echo "sccache proxy configured: endpoint=$SCCACHE_WEBDAV_ENDPOINT"
                    sccache --start-server || true
                  else
                    echo "sccache proxy not ready; continuing without remote cache backend"
                    kill "${PROXY_PID}" >/dev/null 2>&1 || true
                    wait "${PROXY_PID}" >/dev/null 2>&1 || true
                    PROXY_PID=""
                  fi
                fi
              fi

              # Add target
              rustup target add ${{ matrix.target }}

              # Build with appropriate flags
              if boringcache --version >/dev/null 2>&1 && [ -n "${BORINGCACHE_API_TOKEN:-}" ]; then
                TARGET_CACHE_KEY="rust-${{ env.RUST_VERSION }}-docker-build-target-${{ matrix.name }}:/workspace/target"
                if [ "${{ matrix.musl }}" = "true" ]; then
                  boringcache run ${{ github.repository }} "$TARGET_CACHE_KEY" --no-platform --no-git -- sh -c "RUSTFLAGS=\"-C target-feature=+crt-static\" cargo build --locked --release --target ${{ matrix.target }}"
                else
                  boringcache run ${{ github.repository }} "$TARGET_CACHE_KEY" --no-platform --no-git -- cargo build --locked --release --target ${{ matrix.target }}
                fi
              else
                if [ "${{ matrix.musl }}" = "true" ]; then
                  RUSTFLAGS="-C target-feature=+crt-static" cargo build --locked --release --target ${{ matrix.target }}
                else
                  cargo build --locked --release --target ${{ matrix.target }}
                fi
              fi

              # Copy binary
              cp target/${{ matrix.target }}/release/boringcache /workspace/${{ matrix.binary_name }}
              chmod +x /workspace/${{ matrix.binary_name }}

              echo "=== sccache stats ==="
              sccache --show-stats || true
              sccache --stop-server >/dev/null 2>&1 || true
              if [ -n "${PROXY_PID}" ]; then
                kill "${PROXY_PID}" >/dev/null 2>&1 || true
                wait "${PROXY_PID}" >/dev/null 2>&1 || true
              fi
            '

      # Native builds for Ubuntu/macOS/Windows
      - name: Setup Rust (Native builds)
        id: boringcache-rust-native
        if: matrix.use_docker != true
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-ci-build-${{ matrix.name }}"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "true"

      - name: Setup Rust (Native Fallback)
        if: matrix.use_docker != true && steps.boringcache-rust-native.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install Rust target (Native builds)
        if: matrix.use_docker != true
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI (Native builds)
        if: matrix.use_docker != true
        run: |
          cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare binary (Native builds)
        if: matrix.use_docker != true
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/boringcache.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/boringcache ${{ matrix.binary_name }}
            chmod +x ${{ matrix.binary_name }}
          fi
