name: Dependabot Auto-Merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  request-auto-merge:
    name: Request auto-merge
    if: github.event.pull_request.user.login == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Classify Dependabot update
        id: classify
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if printf '%s\n' "$PR_BODY" | grep -q 'update-type: version-update:semver-major'; then
            echo "safe=false" >> "$GITHUB_OUTPUT"
            echo "reason=semver-major update needs human review" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$PR_BODY" | grep -Eq 'update-type: version-update:semver-(minor|patch)'; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            echo "reason=patch/minor dependency update" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "safe=false" >> "$GITHUB_OUTPUT"
          echo "reason=unknown update type needs human review" >> "$GITHUB_OUTPUT"

      - name: Check branch protection
        id: protection
        if: steps.classify.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          contexts="$(gh api "repos/$GITHUB_REPOSITORY/branches/$BASE_BRANCH/protection/required_status_checks" --jq '.contexts | length' 2>/dev/null || true)"
          if [ "${contexts:-0}" -eq 0 ]; then
            echo "protected=false" >> "$GITHUB_OUTPUT"
            echo "No required status checks are configured for $BASE_BRANCH; refusing to arm auto-merge."
            exit 0
          fi

          echo "protected=true" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.classify.outputs.safe == 'true' && steps.protection.outputs.protected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          gh pr merge "$PR_URL" \
            --auto \
            --squash \
            --delete-branch \
            --match-head-commit "$HEAD_SHA"

      - name: Report manual lane
        if: steps.classify.outputs.safe != 'true'
        run: echo "${{ steps.classify.outputs.reason }}"
