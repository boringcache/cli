name: Build and Release CLI

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  RUST_VERSION: "1.89"
  BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
  SCCACHE_VERSION: "v0.13.0"

jobs:
  require-cli-ci:
    name: Require CLI CI Success
    runs-on: ubuntu-latest
    outputs:
      ci_run_id: ${{ steps.gate.outputs.ci_run_id }}
      e2e_run_id: ${{ steps.gate.outputs.e2e_run_id }}
      target_sha: ${{ steps.gate.outputs.target_sha }}

    steps:
      - name: Checkout code (for tag SHA resolution)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify CLI CI passed for tagged commit
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            echo "unsupported trigger for release gate: ${{ github.event_name }}"
            exit 1
          fi

          TARGET_SHA="$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)"
          if [[ -z "${TARGET_SHA}" ]]; then
            echo "failed to resolve target SHA for tag ${TAG}"
            exit 1
          fi
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Checking CLI CI runs for SHA: ${TARGET_SHA}"

          WAIT_TIMEOUT_SECS=10800
          POLL_SECS=30
          DEADLINE_EPOCH="$(( $(date +%s) + WAIT_TIMEOUT_SECS ))"

          wait_for_workflow_success() {
            local workflow_name="$1"
            local run_id=""
            local dispatched=false
            local discover_deadline="$(( $(date +%s) + 120 ))"

            while [[ -z "${run_id}" ]]; do
              run_id="$(gh run list \
                --repo "${{ github.repository }}" \
                --workflow "${workflow_name}" \
                --json databaseId,headSha,status,conclusion \
                --limit 200 \
                --jq ".[] | select(.headSha==\"${TARGET_SHA}\") | .databaseId" \
                | head -n1)"
              if [[ -n "${run_id}" ]]; then
                break
              fi
              if [[ "${dispatched}" == "false" && "$(date +%s)" -ge "${discover_deadline}" ]]; then
                echo "No '${workflow_name}' run found for ${TARGET_SHA}; dispatching..." >&2
                gh workflow run "${workflow_name}" --repo "${{ github.repository }}" --ref "${TARGET_SHA}"
                dispatched=true
              fi
              if [[ "$(date +%s)" -ge "${DEADLINE_EPOCH}" ]]; then
                echo "Timed out waiting for '${workflow_name}' to start for commit ${TARGET_SHA}." >&2
                exit 1
              fi
              echo "Waiting for ${workflow_name} run to start for ${TARGET_SHA}..." >&2
              sleep "${POLL_SECS}"
            done

            while true; do
              local run_status run_conclusion
              run_status="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json status --jq '.status')"
              run_conclusion="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json conclusion --jq '.conclusion // ""')"
              if [[ "${run_status}" == "completed" ]]; then
                if [[ "${run_conclusion}" != "success" ]]; then
                  echo "'${workflow_name}' completed with conclusion=${run_conclusion} for commit ${TARGET_SHA}." >&2
                  exit 1
                fi
                break
              fi
              if [[ "$(date +%s)" -ge "${DEADLINE_EPOCH}" ]]; then
                echo "Timed out waiting for '${workflow_name}' completion for commit ${TARGET_SHA}." >&2
                exit 1
              fi
              echo "Waiting for ${workflow_name} completion (run ${run_id}, status=${run_status})..." >&2
              sleep "${POLL_SECS}"
            done

            printf '%s' "${run_id}"
          }

          fetch_jobs_json() {
            local run_id="$1"
            local attempts=8
            local delay_secs=5
            local payload=""

            for attempt in $(seq 1 "${attempts}"); do
              if payload="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json jobs)"; then
                if printf '%s' "${payload}" | jq -e '.jobs and (.jobs | type == "array") and ([.jobs[] | type == "object"] | all)' >/dev/null 2>&1; then
                  printf '%s' "${payload}"
                  return 0
                fi
              fi
              if [[ "${attempt}" -lt "${attempts}" ]]; then
                echo "Retrying jobs payload fetch for run ${run_id} (${attempt}/${attempts})..." >&2
                sleep "${delay_secs}"
              fi
            done

            echo "Failed to fetch valid jobs payload for run ${run_id}." >&2
            exit 1
          }

          CI_RUN_ID="$(wait_for_workflow_success "CLI CI")"
          E2E_RUN_ID="$(wait_for_workflow_success "E2E Tests")"

          echo "ci_run_id=${CI_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "e2e_run_id=${E2E_RUN_ID}" >> "$GITHUB_OUTPUT"

          JOBS_JSON="$(fetch_jobs_json "${CI_RUN_ID}")"
          for prefix in "Test CLI (BoringCache)"; do
            TOTAL="$(printf '%s' "${JOBS_JSON}" | jq --arg p "${prefix}" '[.jobs[] | select((.name // "") | startswith($p))] | length')"
            OK="$(printf '%s' "${JOBS_JSON}" | jq --arg p "${prefix}" '[.jobs[] | select(((.name // "") | startswith($p)) and ((.conclusion // "")=="success"))] | length')"
            if [[ "${TOTAL}" -eq 0 ]]; then
              echo "Required CI jobs missing for prefix: ${prefix}"
              exit 1
            fi
            if [[ "${TOTAL}" -ne "${OK}" ]]; then
              echo "Required CI jobs not all successful for prefix: ${prefix} (${OK}/${TOTAL})"
              exit 1
            fi
          done

  # Build CLI binaries for multiple platforms
  build-cli:
    name: Build CLI - ${{ matrix.name }}
    needs: [require-cli-ci]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux glibc builds (native runners — Ubuntu 22.04 = glibc 2.35)
          - runner: ubuntu-22.04
            name: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-linux-amd64
            use_docker: false

          - runner: ubuntu-22.04-arm
            name: linux-arm64
            target: aarch64-unknown-linux-gnu
            binary_name: boringcache-linux-arm64
            use_docker: false

          # Linux musl builds (static, for Alpine/minimal containers)
          - runner: ubuntu-latest
            name: linux-musl-amd64
            container: rust:1.89-alpine
            target: x86_64-unknown-linux-musl
            binary_name: boringcache-linux-musl-amd64
            use_docker: true
            musl: true

          - runner: ubuntu-22.04-arm
            name: linux-musl-arm64
            container: rust:1.89-alpine
            target: aarch64-unknown-linux-musl
            binary_name: boringcache-linux-musl-arm64
            use_docker: true
            musl: true

          # macOS builds (GitHub-hosted native)
          - runner: macos-14
            name: macos-14-arm64
            target: aarch64-apple-darwin
            binary_name: boringcache-macos-14-arm64
            use_docker: false
          
          - runner: macos-15
            name: macos-15-arm64
            target: aarch64-apple-darwin
            binary_name: boringcache-macos-15-arm64
            use_docker: false
          
          # Windows builds (GitHub-hosted native)
          - runner: windows-2022
            name: windows-2022-amd64
            target: x86_64-pc-windows-msvc
            binary_name: boringcache-windows-2022-amd64.exe
            use_docker: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup BoringCache Docker cache
        id: boringcache-docker-build
        if: matrix.use_docker == true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          mode: docker
          workspace: ${{ github.repository }}
          image: boringcache-cli-release-build-${{ matrix.name }}
          tags: latest
          context: .
          dockerfile: .github/docker/base-image.Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.container }}
          cache-tag: "docker-release-build-base-${{ matrix.name }}"
          registry-tag: "docker-release-build-base-${{ matrix.name }}"
          push: "false"
          load: "true"
          save-always: "true"

      - name: Copy BoringCache CLI for Docker mount
        if: matrix.use_docker == true
        run: |
          set -eu
          if command -v boringcache >/dev/null 2>&1; then
            cp "$(command -v boringcache)" "${RUNNER_TEMP}/boringcache-bin"
            chmod +x "${RUNNER_TEMP}/boringcache-bin"
            echo "BORINGCACHE_BIN_PATH=${RUNNER_TEMP}/boringcache-bin" >> "${GITHUB_ENV}"
          fi

      # Docker builds for Debian/Alpine
      - name: Build in Docker container
        if: matrix.use_docker == true
        run: |
          BC_MOUNT=""
          DOCKER_IMAGE="${{ matrix.container }}"
          if docker image inspect "boringcache-cli-release-build-${{ matrix.name }}:latest" >/dev/null 2>&1; then
            DOCKER_IMAGE="boringcache-cli-release-build-${{ matrix.name }}:latest"
          fi
          if [ -n "${BORINGCACHE_BIN_PATH:-}" ] && [ -f "${BORINGCACHE_BIN_PATH}" ]; then
            BC_MOUNT="-v ${BORINGCACHE_BIN_PATH}:/usr/local/bin/boringcache:ro"
          elif command -v boringcache >/dev/null 2>&1; then
            BC_MOUNT="-v $(command -v boringcache):/usr/local/bin/boringcache:ro"
          fi
          docker run --rm \
            -v "$PWD:/workspace" \
            $BC_MOUNT \
            -w /workspace \
            -e CARGO_TARGET_DIR=/workspace/target \
            -e BORINGCACHE_API_TOKEN=${{ secrets.BORINGCACHE_API_TOKEN }} \
            "$DOCKER_IMAGE" \
            sh -c '
              set -e

              # Install build dependencies based on container type
              if [ -f /etc/alpine-release ]; then
                apk add --no-cache build-base musl-dev curl
              elif [ -f /etc/debian_version ]; then
                apt-get update
                apt-get install -y build-essential pkg-config libssl-dev curl
                if ! command -v rustup >/dev/null 2>&1; then
                  curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }}
                  export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"
                fi
                if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
                  apt-get install -y gcc-aarch64-linux-gnu
                  export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                  export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
                  export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
                fi
              elif [ -f /etc/arch-release ]; then
                pacman -Syu --noconfirm
                pacman -S --noconfirm base-devel pkg-config openssl curl
                curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain ${{ env.RUST_VERSION }}
                export PATH="/usr/local/cargo/bin:$HOME/.cargo/bin:$PATH"
                if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
                  pacman -S --noconfirm aarch64-linux-gnu-gcc
                  export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
                  export AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar
                  export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
                fi
              fi

              # Install sccache + start proxy for compilation caching
              if boringcache --version >/dev/null 2>&1; then
                SCCACHE_ARCH=$(uname -m)
                SCCACHE_URL="https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/sccache-${{ env.SCCACHE_VERSION }}-${SCCACHE_ARCH}-unknown-linux-musl.tar.gz"
                if curl -fsSL "$SCCACHE_URL" | tar xz -C /tmp; then
                  mv "/tmp/sccache-${{ env.SCCACHE_VERSION }}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
                  chmod +x /usr/local/bin/sccache
                  sccache --version

                  SCCACHE_PORT=4227
                  # Target-scoped but run-stable tag: avoid run-id/attempt suffixes in release builds.
                  boringcache cache-registry ${{ github.repository }} "rust-${{ env.RUST_VERSION }}-sccache-${{ matrix.name }}" \
                    --host 127.0.0.1 --port "$SCCACHE_PORT" --no-platform --no-git &
                  PROXY_PID=$!
                  PROXY_READY=0
                  for _ in $(seq 1 30); do
                    if curl -fsS --max-time 1 "http://127.0.0.1:${SCCACHE_PORT}/v2/" >/dev/null 2>&1; then
                      PROXY_READY=1
                      break
                    fi
                    sleep 0.5
                  done
                  if [ "${PROXY_READY}" = "1" ]; then
                    export SCCACHE_WEBDAV_ENDPOINT="http://127.0.0.1:${SCCACHE_PORT}/"
                    export RUSTC_WRAPPER=sccache
                    echo "sccache proxy configured: endpoint=$SCCACHE_WEBDAV_ENDPOINT"
                    sccache --start-server || true
                  else
                    echo "sccache proxy not ready; continuing without remote cache backend"
                    kill "${PROXY_PID}" >/dev/null 2>&1 || true
                    wait "${PROXY_PID}" >/dev/null 2>&1 || true
                  fi
                fi
              fi

              # Add target
              rustup target add ${{ matrix.target }}

              # Build with appropriate flags.
              # Docker layer caching is handled by boringcache/one above.
              if [ "${{ matrix.musl }}" = "true" ]; then
                RUSTFLAGS="-C target-feature=+crt-static" cargo build --release --target ${{ matrix.target }}
              else
                cargo build --release --target ${{ matrix.target }}
              fi

              # Copy binary
              cp target/${{ matrix.target }}/release/boringcache /workspace/${{ matrix.binary_name }}
              chmod +x /workspace/${{ matrix.binary_name }}

              echo "=== sccache stats ==="
              sccache --show-stats 2>/dev/null || true
            '

      # Native builds for Ubuntu/macOS/Windows
      - name: Setup Rust (Native BoringCache)
        id: boringcache-rust-native
        if: matrix.use_docker != true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          mode: rust-sccache
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-release-build-${{ matrix.name }}"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "false"

      - name: Setup Rust (Native Fallback)
        if: matrix.use_docker != true && steps.boringcache-rust-native.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Normalize Windows compiler env
        if: matrix.use_docker != true && runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust target (Native builds)
        if: matrix.use_docker != true
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI (Native builds)
        if: matrix.use_docker != true
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Native builds)
        if: matrix.use_docker != true
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/boringcache.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/boringcache ${{ matrix.binary_name }}
            chmod +x ${{ matrix.binary_name }}
          fi

      - name: Upload CLI artifact (attempt 1)
        id: upload_cli_artifact_attempt_1
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

      - name: Upload CLI artifact (retry)
        if: steps.upload_cli_artifact_attempt_1.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          overwrite: true

  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [require-cli-ci, build-cli]
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Release workflow should only be triggered by tags or release events" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check whether release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.get_tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create release (if not release event)
        if: github.event_name != 'release' && steps.release_exists.outputs.exists != 'true'
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.get_tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "BoringCache CLI ${{ steps.get_tag.outputs.tag }}" \
            --notes "## BoringCache CLI Release ${{ steps.get_tag.outputs.tag }}

          ### What's New
          - \`run\` command: transactional cache wrapper (restore → exec → save) with signal handling and correct exit codes
          - Maven cache-registry adapter support
          - \`BORINGCACHE_TOKEN_FILE\` env var: read API token from a file path (useful in Docker builds with secret mounts)
          - \`delete\` now also purges proxy/cache-registry internal data for the deleted tag
          - Unified \`cache-registry\` command with native OCI + Bazel + Gradle + Maven + Nx + Turborepo + sccache + Go support
          - Cross-platform support: Linux (AMD64/ARM64), macOS (Apple Silicon), Windows (AMD64)
          - Zstd-compressed tar archives with optional age encryption
          - Streaming I/O for large caches
          - Server-signed manifests with warn-only verification

          ### Downloads
          See the assets below for platform-specific binaries. Each release includes a \`SHA256SUMS\` file for integrity verification.

          ### Usage
          \`\`\`bash
          boringcache auth --token your-api-token
          boringcache run my-workspace \"node-deps:node_modules,build-cache:target\" -- npm test
          boringcache ls my-workspace
          \`\`\`

          ---
          **Releases**: https://github.com/${{ github.repository }}/releases"


  # Upload CLI binaries to release
  upload-cli-assets:
    name: Upload CLI Assets
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        binary:
          - boringcache-linux-amd64
          - boringcache-linux-arm64
          - boringcache-linux-musl-amd64
          - boringcache-linux-musl-arm64
          - boringcache-macos-14-arm64
          - boringcache-macos-15-arm64
          - boringcache-windows-2022-amd64.exe

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary }}
          path: ./

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "./${{ matrix.binary }}" \
            --repo "${{ github.repository }}" \
            --clobber

  # Upload legacy compatibility aliases so existing scripts/actions don't break.
  # These are copies of the generic binary under the old distro-specific names.
  upload-compat-aliases:
    name: Upload Compatibility Aliases
    runs-on: ubuntu-latest
    needs: [create-release, upload-cli-assets]
    steps:
      - name: Download binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          gh release download "${TAG}" --repo "${{ github.repository }}" \
            -p "boringcache-linux-amd64" \
            -p "boringcache-linux-arm64" \
            -p "boringcache-linux-musl-amd64"

      - name: Create and upload aliases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          for name in ubuntu-22.04-amd64 ubuntu-24.04-amd64 ubuntu-25.04-amd64 \
                      debian-bookworm-amd64 debian-bullseye-amd64 arch-amd64; do
            cp boringcache-linux-amd64 "boringcache-${name}"
            gh release upload "${TAG}" "boringcache-${name}" --repo "${REPO}" --clobber
          done

          for name in ubuntu-22.04-arm64 ubuntu-24.04-arm64 ubuntu-25.04-arm64 \
                      debian-bookworm-arm64 debian-bullseye-arm64 arch-arm64; do
            cp boringcache-linux-arm64 "boringcache-${name}"
            gh release upload "${TAG}" "boringcache-${name}" --repo "${REPO}" --clobber
          done

          cp boringcache-linux-musl-amd64 boringcache-alpine-amd64
          gh release upload "${TAG}" boringcache-alpine-amd64 --repo "${REPO}" --clobber

  # Generate and upload SHA256 checksums
  generate-checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [create-release, upload-cli-assets, upload-compat-aliases]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          for dir in */; do
            binary_name="${dir%/}"
            if [ -f "$dir/$binary_name" ]; then
              sha256sum "$dir/$binary_name" | sed "s|$dir/||" >> ../SHA256SUMS
            elif [ -f "$dir/${binary_name}.exe" ]; then
              sha256sum "$dir/${binary_name}.exe" | sed "s|$dir/||" >> ../SHA256SUMS
            fi
          done
          cd ..

          # Add compat alias entries (same hash as the generic binary)
          GLIBC_AMD64=$(grep 'boringcache-linux-amd64$' SHA256SUMS | awk '{print $1}')
          GLIBC_ARM64=$(grep 'boringcache-linux-arm64$' SHA256SUMS | awk '{print $1}')
          MUSL_AMD64=$(grep 'boringcache-linux-musl-amd64$' SHA256SUMS | awk '{print $1}')
          for name in ubuntu-22.04-amd64 ubuntu-24.04-amd64 ubuntu-25.04-amd64 \
                      debian-bookworm-amd64 debian-bullseye-amd64 arch-amd64; do
            echo "${GLIBC_AMD64}  boringcache-${name}" >> SHA256SUMS
          done
          for name in ubuntu-22.04-arm64 ubuntu-24.04-arm64 ubuntu-25.04-arm64 \
                      debian-bookworm-arm64 debian-bullseye-arm64 arch-arm64; do
            echo "${GLIBC_ARM64}  boringcache-${name}" >> SHA256SUMS
          done
          echo "${MUSL_AMD64}  boringcache-alpine-amd64" >> SHA256SUMS

          sort -k2 SHA256SUMS -o SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "./SHA256SUMS" \
            --repo "${{ github.repository }}" \
            --clobber

  # Summary job
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [upload-cli-assets, upload-compat-aliases, generate-checksums]
    if: always()

    steps:
      - name: Generate release summary
        run: |
          echo "## 🎉 BoringCache CLI Release Complete!"
          echo ""
          echo "### ✅ Components Built and Released:"
          echo "- **CLI Binaries**: Linux glibc (AMD64/ARM64), Linux musl (AMD64/ARM64), macOS 14/15 (ARM64), Windows 2022 (AMD64)"
          echo "- **SHA256SUMS**: Integrity verification checksums for all binaries"
          echo "- **GitHub-hosted runners**: Free unlimited builds for public repository"
          echo ""
          echo "### 📦 Release Assets:"
          echo "- CLI binaries for all major platforms and architectures"
          echo "- SHA256SUMS file for integrity verification"
          echo ""
          if [[ "${{ needs.upload-cli-assets.result }}" == "success" && "${{ needs.generate-checksums.result }}" == "success" ]]; then
            echo "### 🚀 Status: SUCCESS"
            echo "CLI built, tested, and released successfully!"
            echo "✅ Ubuntu builds: Working"
