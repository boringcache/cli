name: Build and Release CLI

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  BORINGCACHE_RESTORE_TOKEN: ${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
  BORINGCACHE_SAVE_TOKEN: ${{ secrets.BORINGCACHE_SAVE_TOKEN }}
  SCCACHE_VERSION: "v0.14.0"

jobs:
  require-cli-ci:
    name: Require CLI CI Success
    runs-on: ubuntu-latest
    outputs:
      ci_run_id: ${{ steps.gate.outputs.ci_run_id }}
      e2e_run_id: ${{ steps.gate.outputs.e2e_run_id }}
      target_sha: ${{ steps.gate.outputs.target_sha }}

    steps:
      - name: Checkout code (for tag SHA resolution)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify CLI CI passed for tagged commit
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            echo "unsupported trigger for release gate: ${{ github.event_name }}"
            exit 1
          fi

          TARGET_SHA="$(git rev-list -n 1 "${TAG}" 2>/dev/null || true)"
          if [[ -z "${TARGET_SHA}" ]]; then
            echo "failed to resolve target SHA for tag ${TAG}"
            exit 1
          fi
          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "Checking CLI CI runs for SHA: ${TARGET_SHA}"

          WAIT_TIMEOUT_SECS=10800
          POLL_SECS=30
          DEADLINE_EPOCH="$(( $(date +%s) + WAIT_TIMEOUT_SECS ))"

          wait_for_workflow_success() {
            local workflow_name="$1"
            local run_id=""
            local dispatched=false
            local discover_deadline="$(( $(date +%s) + 120 ))"

            while [[ -z "${run_id}" ]]; do
              run_id="$(gh run list \
                --repo "${{ github.repository }}" \
                --workflow "${workflow_name}" \
                --json databaseId,headSha,status,conclusion \
                --limit 200 \
                --jq ".[] | select(.headSha==\"${TARGET_SHA}\") | .databaseId" \
                | head -n1)"
              if [[ -n "${run_id}" ]]; then
                break
              fi
              if [[ "${dispatched}" == "false" && "$(date +%s)" -ge "${discover_deadline}" ]]; then
                echo "No '${workflow_name}' run found for ${TARGET_SHA}; dispatching..." >&2
                gh workflow run "${workflow_name}" --repo "${{ github.repository }}" --ref "${TARGET_SHA}"
                dispatched=true
              fi
              if [[ "$(date +%s)" -ge "${DEADLINE_EPOCH}" ]]; then
                echo "Timed out waiting for '${workflow_name}' to start for commit ${TARGET_SHA}." >&2
                exit 1
              fi
              echo "Waiting for ${workflow_name} run to start for ${TARGET_SHA}..." >&2
              sleep "${POLL_SECS}"
            done

            while true; do
              local run_status run_conclusion
              run_status="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json status --jq '.status')"
              run_conclusion="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json conclusion --jq '.conclusion // ""')"
              if [[ "${run_status}" == "completed" ]]; then
                if [[ "${run_conclusion}" != "success" ]]; then
                  echo "'${workflow_name}' completed with conclusion=${run_conclusion} for commit ${TARGET_SHA}." >&2
                  exit 1
                fi
                break
              fi
              if [[ "$(date +%s)" -ge "${DEADLINE_EPOCH}" ]]; then
                echo "Timed out waiting for '${workflow_name}' completion for commit ${TARGET_SHA}." >&2
                exit 1
              fi
              echo "Waiting for ${workflow_name} completion (run ${run_id}, status=${run_status})..." >&2
              sleep "${POLL_SECS}"
            done

            printf '%s' "${run_id}"
          }

          fetch_jobs_json() {
            local run_id="$1"
            local attempts=8
            local delay_secs=5
            local payload=""

            for attempt in $(seq 1 "${attempts}"); do
              if payload="$(gh run view "${run_id}" --repo "${{ github.repository }}" --json jobs)"; then
                if printf '%s' "${payload}" | jq -e '.jobs and (.jobs | type == "array") and ([.jobs[] | type == "object"] | all)' >/dev/null 2>&1; then
                  printf '%s' "${payload}"
                  return 0
                fi
              fi
              if [[ "${attempt}" -lt "${attempts}" ]]; then
                echo "Retrying jobs payload fetch for run ${run_id} (${attempt}/${attempts})..." >&2
                sleep "${delay_secs}"
              fi
            done

            echo "Failed to fetch valid jobs payload for run ${run_id}." >&2
            exit 1
          }

          CI_RUN_ID="$(wait_for_workflow_success "CLI CI")"
          E2E_RUN_ID="$(wait_for_workflow_success "E2E Tests")"

          echo "ci_run_id=${CI_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "e2e_run_id=${E2E_RUN_ID}" >> "$GITHUB_OUTPUT"

          JOBS_JSON="$(fetch_jobs_json "${CI_RUN_ID}")"
          for prefix in "Test CLI (BoringCache)"; do
            TOTAL="$(printf '%s' "${JOBS_JSON}" | jq --arg p "${prefix}" '[.jobs[] | select((.name // "") | startswith($p))] | length')"
            OK="$(printf '%s' "${JOBS_JSON}" | jq --arg p "${prefix}" '[.jobs[] | select(((.name // "") | startswith($p)) and ((.conclusion // "")=="success"))] | length')"
            if [[ "${TOTAL}" -eq 0 ]]; then
              echo "Required CI jobs missing for prefix: ${prefix}"
              exit 1
            fi
            if [[ "${TOTAL}" -ne "${OK}" ]]; then
              echo "Required CI jobs not all successful for prefix: ${prefix} (${OK}/${TOTAL})"
              exit 1
            fi
          done

  # Build CLI binaries for multiple platforms
  build-cli:
    name: Build CLI - ${{ matrix.name }}
    needs: [require-cli-ci]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux glibc builds (native runners — Ubuntu 22.04 = glibc 2.35)
          - runner: ubuntu-22.04
            name: linux-amd64
            target: x86_64-unknown-linux-gnu
            binary_name: boringcache-linux-amd64
            use_docker: false

          - runner: ubuntu-22.04-arm
            name: linux-arm64
            target: aarch64-unknown-linux-gnu
            binary_name: boringcache-linux-arm64
            use_docker: false

          # Linux musl builds (static, for Alpine/minimal containers)
          - runner: ubuntu-latest
            name: linux-musl-amd64
            container: alpine:3.21
            target: x86_64-unknown-linux-musl
            cli_platform: alpine-amd64
            binary_name: boringcache-linux-musl-amd64
            use_docker: true
            musl: true

          - runner: ubuntu-22.04-arm
            name: linux-musl-arm64
            container: alpine:3.21
            target: aarch64-unknown-linux-musl
            cli_platform: alpine-arm64
            binary_name: boringcache-linux-musl-arm64
            use_docker: true
            musl: true

          # macOS universal2 build inputs
          - runner: macos-15
            name: macos-arm64
            target: aarch64-apple-darwin
            binary_name: boringcache-macos-arm64
            use_docker: false
            macos_deployment_target: "13.0"

          - runner: macos-15-intel
            name: macos-amd64
            target: x86_64-apple-darwin
            binary_name: boringcache-macos-amd64
            use_docker: false
            macos_deployment_target: "13.0"

          # Windows builds (GitHub-hosted native)
          - runner: windows-2022
            name: windows-amd64
            target: x86_64-pc-windows-msvc
            binary_name: boringcache-windows-amd64.exe
            use_docker: false

          - runner: windows-11-arm
            name: windows-arm64
            target: aarch64-pc-windows-msvc
            binary_name: boringcache-windows-arm64.exe
            use_docker: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve Rust version
        id: rust-version
        shell: bash
        run: echo "version=$(./scripts/rust-version.sh)" >> "$GITHUB_OUTPUT"

      - name: Build cached Docker toolchain image
        id: boringcache-docker-build
        if: matrix.use_docker == true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          cache-runtime: "false"
          mode: docker
          cli-platform: ${{ matrix.cli_platform }}
          workspace: ${{ github.repository }}
          image: boringcache-cli-release-build-${{ matrix.name }}
          tags: latest
          context: .
          dockerfile: .github/docker/base-image.Dockerfile
          build-args: |
            BASE_IMAGE=${{ matrix.container }}
            RUST_VERSION=${{ steps.rust-version.outputs.version }}
            RUST_TARGET=${{ matrix.target }}
            SCCACHE_VERSION=${{ env.SCCACHE_VERSION }}
          cache-tag: "docker-release-build-env-${{ matrix.name }}"
          registry-tag: "docker-release-build-env-${{ matrix.name }}"
          push: "false"
          load: "true"
          save-always: "true"

      - name: Copy Docker build tools for mount
        if: matrix.use_docker == true
        shell: bash
        run: |
          set -euo pipefail
          if command -v boringcache >/dev/null 2>&1; then
            cp "$(command -v boringcache)" "${RUNNER_TEMP}/boringcache-bin"
            chmod +x "${RUNNER_TEMP}/boringcache-bin"
            echo "BORINGCACHE_BIN_PATH=${RUNNER_TEMP}/boringcache-bin" >> "${GITHUB_ENV}"
          fi

      # Docker builds for Debian/Alpine
      - name: Build in Docker container
        if: matrix.use_docker == true
        run: |
          DOCKER_IMAGE="${{ matrix.container }}"
          docker_args=(
            --rm
            -v "$PWD:/workspace"
            -w /workspace
            -e CARGO_TARGET_DIR=/workspace/target
            -e BORINGCACHE_RESTORE_TOKEN=${{ secrets.BORINGCACHE_RESTORE_TOKEN }}
            -e BORINGCACHE_SAVE_TOKEN=${{ secrets.BORINGCACHE_SAVE_TOKEN }}
          )
          if [ -n "${BORINGCACHE_BIN_PATH:-}" ] && [ -f "${BORINGCACHE_BIN_PATH}" ]; then
            docker_args+=(-v "${BORINGCACHE_BIN_PATH}:/usr/local/bin/boringcache:ro")
          elif command -v boringcache >/dev/null 2>&1; then
            docker_args+=(-v "$(command -v boringcache):/usr/local/bin/boringcache:ro")
          fi
          if docker image inspect "boringcache-cli-release-build-${{ matrix.name }}:latest" >/dev/null 2>&1; then
            DOCKER_IMAGE="boringcache-cli-release-build-${{ matrix.name }}:latest"
          fi
          build_args=(
            --rust-version "${{ steps.rust-version.outputs.version }}"
            --target "${{ matrix.target }}"
            --output-path "/workspace/${{ matrix.binary_name }}"
            --workspace "${{ github.repository }}"
            --cache-tag "rust-${{ steps.rust-version.outputs.version }}-sccache-${{ matrix.name }}"
            --sccache-version "${{ env.SCCACHE_VERSION }}"
          )
          if [ "${{ matrix.musl }}" = "true" ]; then
            build_args+=(--musl-crt-static)
          fi
          docker run "${docker_args[@]}" \
            "$DOCKER_IMAGE" \
            ./scripts/ci/docker-build-cli-artifact.sh \
            "${build_args[@]}"

      # Native builds for Ubuntu/macOS/Windows
      - name: Install sccache prebuilt (macOS Intel)
        if: matrix.use_docker != true && matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_DIR="${HOME}/.local/bin"
          TEMP_DIR="$(mktemp -d)"
          ARCHIVE_PATH="${TEMP_DIR}/sccache.tar.gz"
          ASSET="sccache-${{ env.SCCACHE_VERSION }}-x86_64-apple-darwin.tar.gz"
          curl -fsSL "https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/${ASSET}" -o "${ARCHIVE_PATH}"
          tar -xzf "${ARCHIVE_PATH}" -C "${TEMP_DIR}"
          mkdir -p "${INSTALL_DIR}"
          cp "${TEMP_DIR}/sccache-${{ env.SCCACHE_VERSION }}-x86_64-apple-darwin/sccache" "${INSTALL_DIR}/sccache"
          chmod +x "${INSTALL_DIR}/sccache"
          echo "${INSTALL_DIR}" >> "${GITHUB_PATH}"
          "${INSTALL_DIR}/sccache" --version

      - name: Install sccache prebuilt (Windows ARM64)
        if: matrix.use_docker != true && matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $installDir = Join-Path $HOME ".local\bin"
          $tempDir = Join-Path $env:RUNNER_TEMP "sccache-${{ env.SCCACHE_VERSION }}-${{ matrix.name }}"
          $archivePath = Join-Path $tempDir "sccache.zip"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          $asset = "sccache-${{ env.SCCACHE_VERSION }}-aarch64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri "https://github.com/mozilla/sccache/releases/download/${{ env.SCCACHE_VERSION }}/$asset" -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $tempDir -Force
          Copy-Item (Join-Path $tempDir "sccache-${{ env.SCCACHE_VERSION }}-aarch64-pc-windows-msvc\sccache.exe") (Join-Path $installDir "sccache.exe") -Force
          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          & (Join-Path $installDir "sccache.exe") --version

      - name: Setup Rust (Native BoringCache)
        id: boringcache-rust-native
        if: matrix.use_docker != true
        continue-on-error: true
        uses: boringcache/one@v1
        with:
          setup: none
          cache-runtime: "false"
          mode: rust-sccache
          workspace: ${{ github.repository }}
          rust-version: ${{ steps.rust-version.outputs.version }}
          cache-tag: "rust-${{ steps.rust-version.outputs.version }}-release-build-${{ matrix.name }}"
          sccache: "true"
          sccache-mode: "proxy"
          cache-target: "false"

      - name: Setup Rust (Native Fallback)
        if: matrix.use_docker != true && steps.boringcache-rust-native.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust-version.outputs.version }}
          targets: ${{ matrix.target }}

      - name: Normalize Windows compiler env
        if: matrix.use_docker != true && runner.os == 'Windows'
        shell: pwsh
        run: |
          "CC=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Rust target (Native builds)
        if: matrix.use_docker != true
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI (Native builds)
        if: matrix.use_docker != true
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target || '' }}
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary (Native builds)
        if: matrix.use_docker != true
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/boringcache.exe ${{ matrix.binary_name }}
          else
            cp target/${{ matrix.target }}/release/boringcache ${{ matrix.binary_name }}
            chmod +x ${{ matrix.binary_name }}
          fi

      - name: Upload CLI artifact (attempt 1)
        id: upload_cli_artifact_attempt_1
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}

      - name: Upload CLI artifact (retry)
        if: steps.upload_cli_artifact_attempt_1.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          overwrite: true

  build-macos-universal:
    name: Build macOS Universal Binary
    needs: [build-cli]
    runs-on: macos-15

    steps:
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v8
        with:
          name: boringcache-macos-arm64
          path: ./

      - name: Download macOS AMD64 artifact
        uses: actions/download-artifact@v8
        with:
          name: boringcache-macos-amd64
          path: ./

      - name: Create universal binary
        run: |
          lipo -create boringcache-macos-arm64 boringcache-macos-amd64 -output boringcache-macos-universal
          chmod +x boringcache-macos-universal
          file boringcache-macos-universal

      - name: Upload universal macOS artifact (attempt 1)
        id: upload_macos_universal_attempt_1
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: boringcache-macos-universal
          path: boringcache-macos-universal

      - name: Upload universal macOS artifact (retry)
        if: steps.upload_macos_universal_attempt_1.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: boringcache-macos-universal
          path: boringcache-macos-universal
          overwrite: true

  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [require-cli-ci, build-cli, build-macos-universal]
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine release tag
        id: get_tag
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Release workflow should only be triggered by tags or release events" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Check whether release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.get_tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create release (if not release event)
        if: github.event_name != 'release' && steps.release_exists.outputs.exists != 'true'
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.get_tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "BoringCache CLI ${{ steps.get_tag.outputs.tag }}" \
            --notes "## BoringCache CLI Release ${{ steps.get_tag.outputs.tag }}

          ### What's New
          - \`run\` command: transactional cache wrapper (restore → command → save) with signal handling and correct exit codes
          - Maven cache-registry adapter support
          - \`BORINGCACHE_TOKEN_FILE\` env var: read API token from a file path (useful in Docker builds with secret mounts)
          - \`delete\` now also purges proxy/cache-registry internal data for the deleted tag
          - Unified \`cache-registry\` command with native OCI + Bazel + Gradle + Maven + Nx + Turborepo + sccache + Go support
          - Cross-platform support: Linux (glibc/musl AMD64/ARM64), macOS (Universal, macOS 13+), Windows (AMD64/ARM64)
          - Zstd-compressed tar archives with optional age encryption
          - Streaming I/O for large caches
          - Server-signed manifests with warn-only verification

          ### Downloads
          See the assets below for platform-specific binaries. Each release includes a \`SHA256SUMS\` file for integrity verification.

          ### Usage
          \`\`\`bash
          boringcache auth --token your-api-token
          boringcache run my-workspace \"node-deps:node_modules,build-cache:target\" -- npm test
          boringcache ls my-workspace
          \`\`\`

          ---
          **Releases**: https://github.com/${{ github.repository }}/releases"


  # Upload CLI binaries to release
  upload-cli-assets:
    name: Upload CLI Assets
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        binary:
          - boringcache-linux-amd64
          - boringcache-linux-arm64
          - boringcache-linux-musl-amd64
          - boringcache-linux-musl-arm64
          - boringcache-macos-universal
          - boringcache-windows-amd64.exe
          - boringcache-windows-arm64.exe

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.binary }}
          path: ./

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "./${{ matrix.binary }}" \
            --repo "${{ github.repository }}" \
            --clobber

  # Generate and upload SHA256 checksums
  generate-checksums:
    name: Generate Checksums
    runs-on: ubuntu-latest
    needs: [create-release, upload-cli-assets]

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          mkdir -p artifacts
          gh release download "${TAG}" --repo "${{ github.repository }}" --dir artifacts
          rm -f artifacts/SHA256SUMS

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          : > ../SHA256SUMS
          find . -maxdepth 1 -type f -name 'boringcache*' | sort | while read -r path; do
            hash="$(sha256sum "$path" | awk '{print $1}')"
            name="$(basename "$path")"
            printf '%s  %s\n' "${hash}" "${name}" >> ../SHA256SUMS
          done
          cd ..

          sort -k2 SHA256SUMS -o SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "./SHA256SUMS" \
            --repo "${{ github.repository }}" \
            --clobber

  # Summary job
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [upload-cli-assets, generate-checksums]
    if: always()

    steps:
      - name: Generate release summary
        run: |
          echo "## 🎉 BoringCache CLI Release Complete!"
          echo ""
          echo "### ✅ Components Built and Released:"
          echo "- **CLI Binaries**: Linux glibc (AMD64/ARM64), Linux musl (AMD64/ARM64), macOS universal (Intel + ARM64, macOS 13+), Windows (AMD64/ARM64)"
          echo "- **SHA256SUMS**: Integrity verification checksums for all binaries"
          echo "- **GitHub-hosted runners**: Free unlimited builds for public repository"
          echo ""
          echo "### 📦 Release Assets:"
          echo "- CLI binaries for all major platforms and architectures"
          echo "- SHA256SUMS file for integrity verification"
          echo ""
          if [[ "${{ needs.upload-cli-assets.result }}" == "success" && "${{ needs.generate-checksums.result }}" == "success" ]]; then
            echo "### 🚀 Status: SUCCESS"
            echo "CLI built, tested, and released successfully!"
            echo "✅ Ubuntu builds: Working"
            echo "✅ macOS builds: Working"
            echo "✅ Windows builds: Working"
            echo "✅ SHA256SUMS: Generated"
          else
            echo "### ⚠️ Status: PARTIAL SUCCESS"
            echo "Some components may have failed. Check individual job logs:"
            echo "- Upload assets: ${{ needs.upload-cli-assets.result }}"
            echo "- Generate checksums: ${{ needs.generate-checksums.result }}"
          fi
