name: Cache Registry Benchmarks

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "scripts/e2e-*.sh"
      - ".github/workflows/cache-registry-benchmarks.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
  schedule:
    - cron: "25 5 * * *"

permissions:
  contents: read

env:
  RUST_VERSION: "1.89"
  SCCACHE_VERSION: "v0.13.0"
  BAZELISK_VERSION: "v1.20.0"

jobs:
  build-cli-binary:
    name: Build CLI Binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_DEFAULT_WORKSPACE: boringcache/cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-cache-registry-bench-linux-x86_64"
          sccache: "true"
          sccache-mode: "local"
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Build CLI binary
        run: cargo build --release --locked

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: boringcache-cli-release-linux-amd64
          path: target/release/boringcache
          if-no-files-found: error

  benchmark:
    name: Benchmark (${{ matrix.backend }} / ${{ matrix.phase }})
    runs-on: ubuntu-latest
    needs: build-cli-binary
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        include:
          - backend: local
            sccache_backend: local
            phase: efficacy
            run_efficacy: "1"
            run_stress: "0"
          - backend: local
            sccache_backend: local
            phase: stress
            run_efficacy: "0"
            run_stress: "1"
          - backend: proxy
            sccache_backend: proxy
            phase: efficacy
            run_efficacy: "1"
            run_stress: "0"
          - backend: proxy
            sccache_backend: proxy
            phase: stress
            run_efficacy: "0"
            run_stress: "1"
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_DEFAULT_WORKSPACE: boringcache/cli
      RUN_SCOPED_TAGS: "1"
      PARALLEL_JOBS: "2"
      SETTLE_SECS: "5"
      BUILD_TIMEOUT_SECS: "1200"
      STRESS_SCCACHE_ISOLATION: "0"
      BUDGET_STRESS_PROXY_HEALTH_CHECK_FAILS_MAX: "0"
      RUST_LOG_LEVEL: info

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gate matrix leg
        id: gate
        run: |
          set -euo pipefail
          if [[ "${{ matrix.sccache_backend }}" == "proxy" && -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping proxy benchmark: BORINGCACHE_API_TOKEN is not configured."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-cache-registry-bench-linux-x86_64"
          sccache: "true"
          sccache-mode: ${{ matrix.sccache_backend }}
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.gate.outputs.run == 'true' && steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Ensure sccache present
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --version
            exit 0
          fi
          url="https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" | tar xz -C /tmp
          sudo mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sudo chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Download prebuilt CLI binary
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: boringcache-cli-release-linux-amd64
          path: ${{ runner.temp }}/boringcache-bin

      - name: Prepare CLI binary
        if: steps.gate.outputs.run == 'true'
        run: chmod +x "${RUNNER_TEMP}/boringcache-bin/boringcache"

      - name: Run benchmark
        id: run_benchmark
        if: steps.gate.outputs.run == 'true'
        env:
          SCCACHE_BACKEND: ${{ matrix.sccache_backend }}
          RUN_EFFICACY: ${{ matrix.run_efficacy }}
          RUN_STRESS: ${{ matrix.run_stress }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.phase }}" == "efficacy" ]]; then
            export BUDGET_EFFICACY_RUST_HIT_RATE_MIN="95"
            export BUDGET_EFFICACY_CACHE_READ_ERRORS_MAX="0"
            export BUDGET_EFFICACY_CACHE_TIMEOUTS_MAX="0"
            export BUDGET_EFFICACY_PROXY_429_MAX="0"
            export BUDGET_EFFICACY_PROXY_CONFLICTS_MAX="0"
            if [[ "${{ matrix.sccache_backend }}" == "proxy" ]]; then
              export BUDGET_EFFICACY_REMOTE_TAG_HITS_MIN="1"
              # Force a fresh warm dir so efficacy validates remote-index correctness, not local disk reuse.
              export EFFICACY_FRESH_WARM_SCCACHE_DIR="1"
              # Require enough warm compile traffic so hit-rate budgets are statistically meaningful.
              export BUDGET_EFFICACY_WARM_REQUESTS_MIN="100"
              # Require cache-ops records so hit-rate validation cannot pass on missing instrumentation.
              export BUDGET_EFFICACY_CACHE_OPS_RECORDS_MIN="100"
              # Cold+warm mixed traffic should sit around 50% hit rate for seeded-warm scenarios.
              export BUDGET_EFFICACY_TWO_PASS_HIT_RATE_MIN="45"
              export BUDGET_EFFICACY_TWO_PASS_HIT_RATE_MAX="55"
              # Cache-ops GET stream should reflect the same mixed hit-rate envelope.
              export BUDGET_EFFICACY_CACHE_OPS_HIT_RATE_MIN="45"
              export BUDGET_EFFICACY_CACHE_OPS_HIT_RATE_MAX="55"
              export BUDGET_EFFICACY_CACHE_OPS_SCCACHE_HIT_RATE_DELTA_MAX="15"
            fi
          fi
          if [[ "${{ matrix.phase }}" == "stress" ]]; then
            export BUDGET_STRESS_RUST_HIT_RATE_MIN="70"
            export BUDGET_STRESS_CACHE_READ_ERRORS_MAX="0"
            export BUDGET_STRESS_CACHE_TIMEOUTS_MAX="0"
            export BUDGET_STRESS_SCCACHE_STARTUP_TIMEOUTS_MAX="0"
            export BUDGET_STRESS_SCCACHE_UNEXPECTED_SHUTDOWNS_MAX="0"
            export BUDGET_STRESS_LOCK_WAITS_MAX="0"
            export BUDGET_STRESS_PROXY_429_MAX="0"
            export BUDGET_STRESS_PROXY_CONFLICTS_MAX="0"
          fi
          LOG_DIR="${GITHUB_WORKSPACE}/benchmark-logs/${{ matrix.backend }}-${{ matrix.phase }}"
          mkdir -p "$LOG_DIR"
          SCCACHE_DIR="${RUNNER_TEMP}/sccache-bench-${{ matrix.backend }}-${{ matrix.phase }}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$SCCACHE_DIR"
          mkdir -p "$SCCACHE_DIR"
          BRANCH_SLUG="${GITHUB_REF_NAME//\//-}"
          TAG="gha-cache-registry-${{ matrix.backend }}-${{ matrix.phase }}-rust-${RUST_VERSION}-${BRANCH_SLUG}"
          BINARY="${RUNNER_TEMP}/boringcache-bin/boringcache" \
          WORKSPACE="${GITHUB_REPOSITORY}" \
          LOG_DIR="$LOG_DIR" \
          SCCACHE_DIR="$SCCACHE_DIR" \
          TAG="$TAG" \
          ./scripts/e2e-sccache-test.sh | tee "$LOG_DIR/run.log"

      - name: Extract metrics
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          log_dir="${GITHUB_WORKSPACE}/benchmark-logs/${{ matrix.backend }}-${{ matrix.phase }}"
          phase="${{ matrix.phase }}"
          status="${{ steps.run_benchmark.outcome }}"

          cold="0"
          warm="0"
          warm_rust_hit_rate="0"
          warm_avg_read_hit="0"
          efficacy_two_pass_hit_rate="0"
          efficacy_cache_ops_hit_rate="0"
          efficacy_proxy_429="0"
          efficacy_proxy_conflicts="0"

          prewarm="0"
          parallel_avg="0"
          parallel_rust_hit_rate="0"
          stress_lock_waits="0"
          stress_sccache_start_timeouts="0"
          stress_sccache_unexpected_shutdowns="0"
          stress_proxy_429="0"
          stress_proxy_conflicts="0"
          request_metrics_total="0"
          request_metrics_failures="0"
          request_metrics_retry_events="0"
          request_metrics_check_p95_ms="0"
          request_metrics_download_p95_ms="0"
          request_metrics_save_p95_ms="0"
          request_metrics_publish_p95_ms="0"
          request_metrics_prefetch_cycles="0"
          request_metrics_cache_ops_records_total="0"
          request_metrics_cache_ops_sccache_hits="0"
          request_metrics_cache_ops_sccache_misses="0"
          request_metrics_cache_ops_sccache_errors="0"
          request_metrics_cache_ops_sccache_hit_rate="0"
          request_metrics_cache_ops_sccache_get_records_total="0"
          request_metrics_cache_ops_sccache_get_hits="0"
          request_metrics_cache_ops_sccache_get_misses="0"
          request_metrics_cache_ops_sccache_get_errors="0"
          request_metrics_cache_ops_sccache_get_hit_rate="0"

          if [[ "$phase" == "efficacy" ]]; then
            efficacy_cold_hits="0"
            efficacy_cold_misses="0"
            efficacy_warm_hits="0"
            efficacy_warm_misses="0"
            if [[ -f "${log_dir}/efficacy/cold.log.seconds" ]]; then
              cold="$(cat "${log_dir}/efficacy/cold.log.seconds")"
            fi
            if [[ -f "${log_dir}/efficacy/cold-sccache-stats.txt" ]]; then
              efficacy_cold_hits="$(awk '$1 == "Cache" && $2 == "hits" && $3 ~ /^[0-9]+$/ { print $3; exit }' "${log_dir}/efficacy/cold-sccache-stats.txt")"
              efficacy_cold_misses="$(awk '$1 == "Cache" && $2 == "misses" && $3 ~ /^[0-9]+$/ { print $3; exit }' "${log_dir}/efficacy/cold-sccache-stats.txt")"
            fi
            if [[ -f "${log_dir}/efficacy/warm.log.seconds" ]]; then
              warm="$(cat "${log_dir}/efficacy/warm.log.seconds")"
            fi
            if [[ -f "${log_dir}/efficacy/warm-sccache-stats.txt" ]]; then
              warm_rust_hit_rate="$(awk '$1 == "Cache" && $2 == "hits" && $3 == "rate" && $4 == "(Rust)" { print $(NF-1); exit }' "${log_dir}/efficacy/warm-sccache-stats.txt")"
              warm_avg_read_hit="$(awk '$1 == "Average" && $2 == "cache" && $3 == "read" && $4 == "hit" { print $5; exit }' "${log_dir}/efficacy/warm-sccache-stats.txt")"
              efficacy_warm_hits="$(awk '$1 == "Cache" && $2 == "hits" && $3 ~ /^[0-9]+$/ { print $3; exit }' "${log_dir}/efficacy/warm-sccache-stats.txt")"
              efficacy_warm_misses="$(awk '$1 == "Cache" && $2 == "misses" && $3 ~ /^[0-9]+$/ { print $3; exit }' "${log_dir}/efficacy/warm-sccache-stats.txt")"
            fi
            if [[ -f "${log_dir}/efficacy/proxy.log" ]]; then
              efficacy_proxy_429="$(grep -c "429 Too Many Requests" "${log_dir}/efficacy/proxy.log" || true)"
              efficacy_proxy_conflicts="$(grep -c "tag conflict" "${log_dir}/efficacy/proxy.log" || true)"
            fi
            efficacy_two_pass_hit_rate="$(awk \
              -v cold_hits="${efficacy_cold_hits:-0}" \
              -v cold_misses="${efficacy_cold_misses:-0}" \
              -v warm_hits="${efficacy_warm_hits:-0}" \
              -v warm_misses="${efficacy_warm_misses:-0}" \
              'BEGIN {
                total_hits = cold_hits + warm_hits;
                total_misses = cold_misses + warm_misses;
                denom = total_hits + total_misses;
                if (denom == 0) { printf "0.00" } else { printf "%.2f", (total_hits * 100) / denom }
              }'
            )"
          fi

          if [[ "$phase" == "stress" ]]; then
            prewarm_sum=0
            parallel_sum=0
            for i in $(seq 1 "${PARALLEL_JOBS}"); do
              if [[ -f "${log_dir}/stress/prewarm-${i}.log.seconds" ]]; then
                prewarm_sum=$((prewarm_sum + $(cat "${log_dir}/stress/prewarm-${i}.log.seconds")))
              fi
              if [[ -f "${log_dir}/stress/parallel-${i}.log.seconds" ]]; then
                parallel_sum=$((parallel_sum + $(cat "${log_dir}/stress/parallel-${i}.log.seconds")))
              fi
              if [[ -f "${log_dir}/stress/parallel-${i}.log" ]]; then
                stress_lock_waits=$((stress_lock_waits + $(grep -c "Blocking waiting for file lock" "${log_dir}/stress/parallel-${i}.log" || true)))
              fi
            done
            if [[ "${PARALLEL_JOBS}" -gt 0 ]]; then
              prewarm=$((prewarm_sum / PARALLEL_JOBS))
              parallel_avg=$((parallel_sum / PARALLEL_JOBS))
            fi
            if [[ -f "${log_dir}/stress/parallel-sccache-stats.txt" ]]; then
              parallel_rust_hit_rate="$(awk '$1 == "Cache" && $2 == "hits" && $3 == "rate" && $4 == "(Rust)" { print $(NF-1); exit }' "${log_dir}/stress/parallel-sccache-stats.txt")"
            fi
            if [[ -f "${log_dir}/run.log" ]]; then
              stress_sccache_start_timeouts="$(sed -n 's/^[[:space:]]*sccache start timeouts:[[:space:]]*\([0-9][0-9]*\).*$/\1/p' "${log_dir}/run.log" | tail -1)"
              stress_sccache_unexpected_shutdowns="$(sed -n 's/^[[:space:]]*sccache unexpected shutdowns:[[:space:]]*\([0-9][0-9]*\).*$/\1/p' "${log_dir}/run.log" | tail -1)"
            fi
            if [[ -f "${log_dir}/stress/proxy.log" ]]; then
              stress_proxy_429="$(grep -c "429 Too Many Requests" "${log_dir}/stress/proxy.log" || true)"
              stress_proxy_conflicts="$(grep -c "tag conflict" "${log_dir}/stress/proxy.log" || true)"
            fi
          fi

          request_metrics_file="${log_dir}/${phase}/request-metrics.jsonl"
          if [[ -f "$request_metrics_file" ]]; then
            python3 scripts/request-metrics-summary.py "$request_metrics_file" > "${log_dir}/request-metrics-summary.env"
            source "${log_dir}/request-metrics-summary.env"
            if [[ "$phase" == "efficacy" ]]; then
              efficacy_cache_ops_hit_rate="${request_metrics_cache_ops_sccache_get_hit_rate:-0}"
            fi
          fi

          warm_rust_hit_rate="${warm_rust_hit_rate:-0}"
          warm_avg_read_hit="${warm_avg_read_hit:-0}"
          parallel_rust_hit_rate="${parallel_rust_hit_rate:-0}"
          stress_sccache_start_timeouts="${stress_sccache_start_timeouts:-0}"
          stress_sccache_unexpected_shutdowns="${stress_sccache_unexpected_shutdowns:-0}"

          {
            echo "backend=${{ matrix.backend }}"
            echo "phase=${phase}"
            echo "status=${status}"
            echo "cold_seconds=${cold}"
            echo "warm_seconds=${warm}"
            echo "warm_rust_hit_rate=${warm_rust_hit_rate}"
            echo "warm_avg_cache_read_hit=${warm_avg_read_hit}"
            echo "efficacy_two_pass_hit_rate=${efficacy_two_pass_hit_rate}"
            echo "efficacy_cache_ops_sccache_hit_rate=${efficacy_cache_ops_hit_rate}"
            echo "efficacy_proxy_429=${efficacy_proxy_429}"
            echo "efficacy_proxy_tag_conflicts=${efficacy_proxy_conflicts}"
            echo "prewarm_seconds=${prewarm}"
            echo "parallel_avg_seconds=${parallel_avg}"
            echo "parallel_rust_hit_rate=${parallel_rust_hit_rate}"
            echo "stress_lock_waits=${stress_lock_waits}"
            echo "stress_sccache_start_timeouts=${stress_sccache_start_timeouts}"
            echo "stress_sccache_unexpected_shutdowns=${stress_sccache_unexpected_shutdowns}"
            echo "stress_proxy_429=${stress_proxy_429}"
            echo "stress_proxy_tag_conflicts=${stress_proxy_conflicts}"
            echo "request_metrics_total=${request_metrics_total}"
            echo "request_metrics_failures=${request_metrics_failures}"
            echo "request_metrics_retry_events=${request_metrics_retry_events}"
            echo "request_metrics_check_p95_ms=${request_metrics_check_p95_ms}"
            echo "request_metrics_download_p95_ms=${request_metrics_download_p95_ms}"
            echo "request_metrics_save_p95_ms=${request_metrics_save_p95_ms}"
            echo "request_metrics_publish_p95_ms=${request_metrics_publish_p95_ms}"
            echo "request_metrics_prefetch_cycles=${request_metrics_prefetch_cycles}"
            echo "request_metrics_cache_ops_records_total=${request_metrics_cache_ops_records_total}"
            echo "request_metrics_cache_ops_sccache_hits=${request_metrics_cache_ops_sccache_hits}"
            echo "request_metrics_cache_ops_sccache_misses=${request_metrics_cache_ops_sccache_misses}"
            echo "request_metrics_cache_ops_sccache_errors=${request_metrics_cache_ops_sccache_errors}"
            echo "request_metrics_cache_ops_sccache_hit_rate=${request_metrics_cache_ops_sccache_hit_rate}"
            echo "request_metrics_cache_ops_sccache_get_records_total=${request_metrics_cache_ops_sccache_get_records_total}"
            echo "request_metrics_cache_ops_sccache_get_hits=${request_metrics_cache_ops_sccache_get_hits}"
            echo "request_metrics_cache_ops_sccache_get_misses=${request_metrics_cache_ops_sccache_get_misses}"
            echo "request_metrics_cache_ops_sccache_get_errors=${request_metrics_cache_ops_sccache_get_errors}"
            echo "request_metrics_cache_ops_sccache_get_hit_rate=${request_metrics_cache_ops_sccache_get_hit_rate}"
          } > "${log_dir}/metrics.env"

      - name: Upload benchmark artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cache-registry-benchmark-${{ matrix.backend }}-${{ matrix.phase }}
          path: benchmark-logs/${{ matrix.backend }}-${{ matrix.phase }}

  adapter-e2e:
    name: Adapter E2E (${{ matrix.leg }})
    runs-on: ubuntu-latest
    needs: build-cli-binary
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - leg: adapters-http
            needs_sccache: "false"
          - leg: cli-core
            needs_sccache: "false"
          - leg: bazel-real
            needs_sccache: "false"
            needs_bazel: "true"
          - leg: dual-proxy
            needs_sccache: "true"
          - leg: docker-buildkit
            needs_sccache: "false"
          - leg: prefetch-readiness
            needs_sccache: "false"
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
      BORINGCACHE_DEFAULT_WORKSPACE: boringcache/cli
      RUN_SCOPED_TAGS: "1"
      SETTLE_SECS: "5"
      BUILD_TIMEOUT_SECS: "1800"
      BUILD_HEARTBEAT_SECS: "30"
      BUILD_CLEANUP_WAIT_SECS: "20"
      BUILD_FAILURE_TAIL_LINES: "120"
      PROXY_SHUTDOWN_WAIT_SECS: "30"
      RUST_LOG_LEVEL: warn

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Gate adapter leg
        id: gate
        run: |
          set -euo pipefail
          if [[ -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping adapter leg: BORINGCACHE_API_TOKEN is not configured."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust (BoringCache)
        id: boringcache-rust
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        uses: boringcache/rust-action@v1
        with:
          workspace: ${{ github.repository }}
          rust-version: ${{ env.RUST_VERSION }}
          cache-tag: "rust-${{ env.RUST_VERSION }}-cache-registry-bench-linux-x86_64"
          sccache: "true"
          sccache-mode: "local"
          cache-target: "true"

      - name: Setup Rust (Fallback)
        if: steps.gate.outputs.run == 'true' && steps.boringcache-rust.outcome == 'failure'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Ensure sccache present
        if: steps.gate.outputs.run == 'true' && matrix.needs_sccache == 'true'
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null 2>&1; then
            sccache --version
            exit 0
          fi
          url="https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" | tar xz -C /tmp
          sudo mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sudo chmod +x /usr/local/bin/sccache
          sccache --version

      - name: Ensure bazel present
        if: steps.gate.outputs.run == 'true' && matrix.needs_bazel == 'true'
        run: |
          set -euo pipefail
          if command -v bazel >/dev/null 2>&1; then
            bazel --version
            exit 0
          fi
          url="https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64"
          curl -fsSL "$url" -o /tmp/bazelisk
          sudo mv /tmp/bazelisk /usr/local/bin/bazel
          sudo chmod +x /usr/local/bin/bazel
          bazel --version

      - name: Download prebuilt CLI binary
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: boringcache-cli-release-linux-amd64
          path: ${{ runner.temp }}/boringcache-bin

      - name: Prepare CLI binary
        if: steps.gate.outputs.run == 'true'
        run: chmod +x "${RUNNER_TEMP}/boringcache-bin/boringcache"

      - name: Run adapter leg
        id: run_adapter
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/benchmark-logs/adapter-${LEG}"
          mkdir -p "$LOG_DIR"
          TAG="gha-adapter-${LEG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          BIN_PATH="${RUNNER_TEMP}/boringcache-bin/boringcache"
          case "$LEG" in
            adapters-http)
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-all-adapters-http-test.sh | tee "$LOG_DIR/run.log"
              ;;
            cli-core)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              BORINGCACHE_API_URL="https://api.boringcache.com" \
              LOG_DIR="$LOG_DIR" \
              ./scripts/e2e-cli-core-test.sh | tee "$LOG_DIR/run.log"
              ;;
            bazel-real)
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BAZEL_BUILD_JOBS="256" \
              BAZEL_REMOTE_MAX_CONNECTIONS="64" \
              STRESS_ACTION_COUNT="96" \
              BUDGET_REMOTE_TIMEOUTS_MAX="0" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-bazel-real-test.sh | tee "$LOG_DIR/run.log"
              ;;
            dual-proxy)
              # Dual-proxy contention uses isolated target dirs, so absolute GET hit-rate is workload-dependent.
              # Shutdown flush summary duration includes real upload time; correctness is guarded by
              # remote-tag visibility, no flush timeouts, and no permanent drops instead.
              BINARY="$BIN_PATH" \
              LOG_DIR="$LOG_DIR" \
              TAG="$TAG" \
              BUDGET_CONTENTION_WALL_SECONDS_MAX="480" \
              BUDGET_TOTAL_CONFLICTS_MAX="20" \
              BUDGET_PROXY_429_MAX="0" \
              BUDGET_CACHE_OPS_GET_RECORDS_MIN="300" \
              BUDGET_CACHE_OPS_GET_HIT_RATE_MAX="100" \
              BUDGET_CACHE_OPS_SCCACHE_HIT_RATE_DELTA_MAX="15" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-dual-proxy-contention-test.sh | tee "$LOG_DIR/run.log"
              ;;
            docker-buildkit)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              E2E_TAG_PREFIX="gha-cache-registry" \
              PORT="5000" \
              LOG_DIR="$LOG_DIR" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              ./scripts/e2e-docker-buildkit-registry-test.sh | tee "$LOG_DIR/run.log"
              ;;
            prefetch-readiness)
              BINARY="$BIN_PATH" \
              WORKSPACE="${GITHUB_REPOSITORY}" \
              TAG="gha-prefetch-readiness-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              BLOB_COUNT="20000" \
              BLOB_SIZE_BYTES="4096" \
              SEED_CONCURRENCY="64" \
              VERIFY_CONCURRENCY="64" \
              BUDGET_REMOTE_TAG_HITS_MIN="1" \
              PROXY_SHUTDOWN_WAIT_SECS="120" \
              SEED_FLUSH_TIMEOUT_SECS="240" \
              LOG_DIR="$LOG_DIR" \
              ./scripts/e2e-prefetch-readiness-test.sh | tee "$LOG_DIR/run.log"
              ;;
            *)
              echo "Unknown adapter leg: $LEG"
              exit 1
              ;;
          esac

      - name: Validate adapter scenario coverage
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/benchmark-logs/adapter-${LEG}"
          LOG_FILE="${LOG_DIR}/run.log"
          if [[ ! -f "$LOG_FILE" ]]; then
            echo "ERROR: expected adapter run log at ${LOG_FILE}"
            exit 1
          fi

          assert_log_contains() {
            local pattern="$1"
            local label="$2"
            if ! grep -Fq "$pattern" "$LOG_FILE"; then
              echo "ERROR: missing adapter scenario marker (${label}): ${pattern}"
              echo "--- log tail ---"
              tail -n 200 "$LOG_FILE" || true
              exit 1
            fi
          }

          case "$LEG" in
            adapters-http)
              assert_log_contains "=== Phase 1: Write and read with running proxy ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Read-only verification after proxy restart ===" "phase2"
              assert_log_contains "All adapter HTTP e2e checks passed" "success"
              ;;
            cli-core)
              assert_log_contains "=== Phase 1: Save/restore/delete (archive cache path) ===" "phase1"
              assert_log_contains "=== Phase 2: run command cache integration ===" "phase2"
              assert_log_contains "=== Phase 3: encryption + mount sync ===" "phase3"
              assert_log_contains "CLI core e2e passed" "success"
              ;;
            bazel-real)
              assert_log_contains "=== Phase 1: Cold build (expect local execution + upload) ===" "phase1"
              assert_log_contains "=== Phase 2: Warm build with isolated output root (expect remote hit) ===" "phase2"
              assert_log_contains "=== Phase 2b: Verify published remote tag resolves ===" "phase2b"
              assert_log_contains "=== Phase 3: Restart proxy and verify persisted remote hit ===" "phase3"
              assert_log_contains "=== Phase 4: High-concurrency stress warm (expect remote hits, no connect timeouts) ===" "phase4"
              assert_log_contains "Bazel real-client e2e passed" "success"
              ;;
            dual-proxy)
              assert_log_contains "=== Phase 1: Prewarm (populate baseline tag) ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Dual-Proxy Contention ===" "phase2"
              assert_log_contains "=== Phase 2b: Verify published remote tag after contention flush ===" "phase2b"
              assert_log_contains "=== Phase 3: Verification (merged index check) ===" "phase3"
              assert_log_contains "PASS: both proxies flushed without timeouts/drops" "success"
              ;;
            docker-buildkit)
              assert_log_contains "=== Phase 1: Cold build and warm import ===" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Restart proxy and verify persisted warm import ===" "phase2"
              assert_log_contains "=== Phase 3: Implicit latest cache import compatibility ===" "phase3"
              assert_log_contains "=== Phase 4: Alias publish and alias warm import ===" "phase4"
              assert_log_contains "Docker buildkit registry e2e passed" "success"
              ;;
            prefetch-readiness)
              assert_log_contains "=== Phase 1: Seed" "phase1"
              assert_log_contains "=== Phase 1b: Verify published remote tag resolves ===" "phase1b"
              assert_log_contains "=== Phase 2: Restart proxy on fresh disk cache" "phase2"
              assert_log_contains "=== Phase 3: Verify all" "phase3"
              assert_log_contains "Prefetch readiness e2e passed" "success"
              ;;
            *)
              echo "ERROR: unknown adapter leg: ${LEG}"
              exit 1
              ;;
          esac

      - name: Extract adapter metrics
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          LEG="${{ matrix.leg }}"
          LOG_DIR="${GITHUB_WORKSPACE}/benchmark-logs/adapter-${LEG}"
          status="${{ steps.run_adapter.outcome }}"
          {
            echo "leg=${LEG}"
            echo "status=${status}"
          } > "${LOG_DIR}/adapter-metrics.env"

      - name: Upload adapter artifacts
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cache-registry-benchmark-adapter-${{ matrix.leg }}
          path: benchmark-logs/adapter-${{ matrix.leg }}

  cross-runner-seed:
    name: Cross-Runner CAS Seed
    runs-on: ubuntu-latest
    needs: build-cli-binary
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.seed.outputs.tag }}
      cas_digest: ${{ steps.seed.outputs.cas_digest }}
      ac_digest: ${{ steps.seed.outputs.ac_digest }}
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - name: Gate
        id: gate
        run: |
          if [[ -z "${BORINGCACHE_API_TOKEN:-}" ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download CLI binary
        if: steps.gate.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: boringcache-cli-release-linux-amd64
          path: ${{ runner.temp }}/bin

      - name: Seed CAS via proxy
        id: seed
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          source ./scripts/e2e-remote-tag.sh
          CLI="${RUNNER_TEMP}/bin/boringcache"
          chmod +x "$CLI"
          TAG="gha-cross-runner-cas-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          WORK_DIR="$(mktemp -d)"
          PROXY_PORT=5050
          PROXY_URL="http://127.0.0.1:${PROXY_PORT}"
          PROXY_LOG="${WORK_DIR}/proxy.log"

          CAS_PAYLOAD="${WORK_DIR}/cas-payload.bin"
          dd if=/dev/urandom bs=1024 count=64 2>/dev/null | base64 > "$CAS_PAYLOAD"
          CAS_DIGEST="$(sha256sum "$CAS_PAYLOAD" | awk '{print $1}')"

          AC_PAYLOAD="${WORK_DIR}/ac-payload.bin"
          printf 'cross-runner-ac-%s-%s\n' "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" > "$AC_PAYLOAD"
          AC_DIGEST="$(sha256sum "$AC_PAYLOAD" | awk '{print $1}')"

          RUST_LOG=info "$CLI" cache-registry "${{ github.repository }}" "$TAG" \
            --host 127.0.0.1 --port "$PROXY_PORT" --no-platform --no-git \
            >>"$PROXY_LOG" 2>&1 &
          PROXY_PID=$!

          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "${PROXY_URL}/v2/" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$PROXY_PID" 2>/dev/null; then
              echo "ERROR: proxy exited during startup"
              cat "$PROXY_LOG"
              exit 1
            fi
            sleep 1
          done

          echo "Proxy ready, writing CAS + AC blobs..."
          curl -fsS --max-time 30 -X PUT --data-binary "@${CAS_PAYLOAD}" -o /dev/null -w "CAS PUT: %{http_code}\n" "${PROXY_URL}/cas/${CAS_DIGEST}"
          curl -fsS --max-time 30 -X PUT --data-binary "@${AC_PAYLOAD}" -o /dev/null -w "AC PUT: %{http_code}\n" "${PROXY_URL}/ac/${AC_DIGEST}"

          echo "Verifying blobs readable on same proxy..."
          curl -fsS --max-time 30 -o "${WORK_DIR}/cas-verify.bin" "${PROXY_URL}/cas/${CAS_DIGEST}"
          if ! cmp -s "$CAS_PAYLOAD" "${WORK_DIR}/cas-verify.bin"; then
            echo "ERROR: CAS blob readback mismatch on seed runner"
            exit 1
          fi
          curl -fsS --max-time 30 -o "${WORK_DIR}/ac-verify.bin" "${PROXY_URL}/ac/${AC_DIGEST}"
          if ! cmp -s "$AC_PAYLOAD" "${WORK_DIR}/ac-verify.bin"; then
            echo "ERROR: AC blob readback mismatch on seed runner"
            exit 1
          fi

          echo "Flushing proxy (graceful shutdown)..."
          kill "$PROXY_PID"
          wait "$PROXY_PID" 2>/dev/null || true

          echo "Waiting for published remote tag before handing off to fresh runner..."
          verify_remote_tag_visible \
            "$CLI" \
            "${{ github.repository }}" \
            "$TAG" \
            "${WORK_DIR}/publish-check" \
            1 \
            45 \
            2 \
            "$PROXY_LOG"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "cas_digest=${CAS_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "ac_digest=${AC_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Seed complete: tag=${TAG} cas=${CAS_DIGEST} ac=${AC_DIGEST}"

      - name: Upload seed payloads
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cross-runner-seed-payloads
          path: |
            ${{ runner.temp }}/cross-runner-seed/
          if-no-files-found: ignore

  cross-runner-verify:
    name: Cross-Runner CAS Verify
    runs-on: ubuntu-latest
    needs: [build-cli-binary, cross-runner-seed]
    if: needs.cross-runner-seed.outputs.tag != ''
    timeout-minutes: 10
    env:
      BORINGCACHE_API_TOKEN: ${{ secrets.BORINGCACHE_API_TOKEN }}
    steps:
      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: boringcache-cli-release-linux-amd64
          path: ${{ runner.temp }}/bin

      - name: Verify CAS on fresh runner via proxy
        run: |
          set -euo pipefail
          CLI="${RUNNER_TEMP}/bin/boringcache"
          chmod +x "$CLI"
          TAG="${{ needs.cross-runner-seed.outputs.tag }}"
          CAS_DIGEST="${{ needs.cross-runner-seed.outputs.cas_digest }}"
          AC_DIGEST="${{ needs.cross-runner-seed.outputs.ac_digest }}"
          WORK_DIR="$(mktemp -d)"
          PROXY_PORT=5050
          PROXY_URL="http://127.0.0.1:${PROXY_PORT}"
          PROXY_LOG="${WORK_DIR}/proxy.log"

          RUST_LOG=info "$CLI" cache-registry "${{ github.repository }}" "$TAG" \
            --host 127.0.0.1 --port "$PROXY_PORT" --no-platform --no-git \
            >>"$PROXY_LOG" 2>&1 &
          PROXY_PID=$!

          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 "${PROXY_URL}/v2/" >/dev/null 2>&1; then
              break
            fi
            if ! kill -0 "$PROXY_PID" 2>/dev/null; then
              echo "ERROR: proxy exited during startup"
              cat "$PROXY_LOG"
              exit 1
            fi
            sleep 1
          done

          echo "Proxy ready on fresh runner, verifying CAS blobs..."
          CAS_STATUS="$(curl -sS --max-time 30 -o "${WORK_DIR}/cas-restored.bin" -w "%{http_code}" "${PROXY_URL}/cas/${CAS_DIGEST}")"
          if [[ "$CAS_STATUS" != "200" ]]; then
            echo "ERROR: CAS GET returned ${CAS_STATUS} (expected 200)"
            echo "This means the tag pointer did not update — blobs were not linked during stage."
            echo "--- proxy log ---"
            tail -n 60 "$PROXY_LOG"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          CAS_ACTUAL="$(sha256sum "${WORK_DIR}/cas-restored.bin" | awk '{print $1}')"
          if [[ "$CAS_ACTUAL" != "$CAS_DIGEST" ]]; then
            echo "ERROR: CAS content mismatch"
            echo "  expected digest: ${CAS_DIGEST}"
            echo "  actual digest:   ${CAS_ACTUAL}"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          echo "CAS blob verified: digest matches"

          AC_STATUS="$(curl -sS --max-time 30 -o "${WORK_DIR}/ac-restored.bin" -w "%{http_code}" "${PROXY_URL}/ac/${AC_DIGEST}")"
          if [[ "$AC_STATUS" != "200" ]]; then
            echo "ERROR: AC GET returned ${AC_STATUS} (expected 200)"
            echo "--- proxy log ---"
            tail -n 60 "$PROXY_LOG"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          AC_ACTUAL="$(sha256sum "${WORK_DIR}/ac-restored.bin" | awk '{print $1}')"
          if [[ "$AC_ACTUAL" != "$AC_DIGEST" ]]; then
            echo "ERROR: AC content mismatch"
            echo "  expected digest: ${AC_DIGEST}"
            echo "  actual digest:   ${AC_ACTUAL}"
            kill "$PROXY_PID" 2>/dev/null || true
            exit 1
          fi
          echo "AC blob verified: digest matches"

          echo "Cross-runner CAS persistence verified"
          kill "$PROXY_PID" 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          CLI="${RUNNER_TEMP}/bin/boringcache"
          TAG="${{ needs.cross-runner-seed.outputs.tag }}"
          "$CLI" delete --no-platform --no-git "${{ github.repository }}" "${TAG}" || true

  benchmark-summary:
    name: Cache Registry Benchmark Summary
    runs-on: ubuntu-latest
    needs:
      - benchmark
      - adapter-e2e
      - cross-runner-verify
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Write summary
        run: |
          set -euo pipefail
          echo "# Cache Registry Benchmarks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "## Efficacy (cold/warm)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | Status | Cold (s) | Warm (s) | Warm Rust hit rate | Two-pass Rust hit rate | Cache ops sccache GET hit rate | Warm avg cache read hit (s) | Proxy 429 | Proxy conflicts |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|----------|----------|--------------------|------------------------|--------------------------------|-----------------------------|-----------|-----------------|" >> "$GITHUB_STEP_SUMMARY"

          local_warm=""
          proxy_warm=""

          mapfile -t metric_files < <(find artifacts -type f -name metrics.env | sort)
          for metrics in "${metric_files[@]}"; do
            # shellcheck disable=SC1090
            source "$metrics"
            if [[ "${phase}" != "efficacy" ]]; then
              continue
            fi
            echo "| ${backend} | ${status} | ${cold_seconds} | ${warm_seconds} | ${warm_rust_hit_rate}% | ${efficacy_two_pass_hit_rate}% | ${efficacy_cache_ops_sccache_hit_rate}% | ${warm_avg_cache_read_hit} | ${efficacy_proxy_429} | ${efficacy_proxy_tag_conflicts} |" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${status}" == "success" ]]; then
              case "$backend" in
                local) local_warm="$warm_seconds" ;;
                proxy) proxy_warm="$warm_seconds" ;;
              esac
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$local_warm" && -n "$proxy_warm" ]]; then
            delta="$(awk -v p="$proxy_warm" -v l="$local_warm" 'BEGIN { printf "%.2f", p-l }')"
            pct="$(awk -v p="$proxy_warm" -v l="$local_warm" 'BEGIN { if (l <= 0) { print "0.00" } else { printf "%.2f", ((p-l)/l)*100 } }')"
            echo "- Warm delta (proxy - local): ${delta}s (${pct}%)" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Stress (prewarm/parallel)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | Status | Prewarm avg (s) | Parallel avg (s) | Parallel Rust hit rate | sccache start timeouts | sccache unexpected shutdowns | Lock waits | Proxy 429 | Proxy conflicts |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|-----------------|------------------|------------------------|------------------------|------------------------------|-----------|-----------|-----------------|" >> "$GITHUB_STEP_SUMMARY"

          local_parallel=""
          proxy_parallel=""

          for metrics in "${metric_files[@]}"; do
            # shellcheck disable=SC1090
            source "$metrics"
            if [[ "${phase}" != "stress" ]]; then
              continue
            fi
            echo "| ${backend} | ${status} | ${prewarm_seconds} | ${parallel_avg_seconds} | ${parallel_rust_hit_rate}% | ${stress_sccache_start_timeouts} | ${stress_sccache_unexpected_shutdowns} | ${stress_lock_waits} | ${stress_proxy_429} | ${stress_proxy_tag_conflicts} |" >> "$GITHUB_STEP_SUMMARY"
            if [[ "${status}" == "success" ]]; then
              case "$backend" in
                local) local_parallel="$parallel_avg_seconds" ;;
                proxy) proxy_parallel="$parallel_avg_seconds" ;;
              esac
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$local_parallel" && -n "$proxy_parallel" ]]; then
            delta="$(awk -v p="$proxy_parallel" -v l="$local_parallel" 'BEGIN { printf "%.2f", p-l }')"
            pct="$(awk -v p="$proxy_parallel" -v l="$local_parallel" 'BEGIN { if (l <= 0) { print "0.00" } else { printf "%.2f", ((p-l)/l)*100 } }')"
            echo "- Parallel avg delta (proxy - local): ${delta}s (${pct}%)" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Adapter E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Leg | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          mapfile -t adapter_metric_files < <(find artifacts -type f -name adapter-metrics.env | sort)
          for metrics in "${adapter_metric_files[@]}"; do
            # shellcheck disable=SC1090
            source "$metrics"
            echo "| ${leg} | ${status} |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Cross-Runner Cache Persistence" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cross_runner_status="${{ needs.cross-runner-verify.result }}"
          echo "| Test | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| CAS blob persistence across runners (proxy) | ${cross_runner_status} |" >> "$GITHUB_STEP_SUMMARY"
